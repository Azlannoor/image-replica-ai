<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Replica AI - Azlan Noor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
</head>
<body class="bg-slate-950">
    <div id="root">
        <div style="color: #94a3b8; padding: 50px; text-align: center; font-family: sans-serif;">
            Memuat Sistem AI Master Prompt Pro Max...<br><br>
            <small>Tunggu sebentar...</small>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '20px', color: '#f87171', fontFamily: 'monospace', background: '#450a0a', minHeight: '100vh' }}>
                            <h2>⚠️ Terjadi Kesalahan Sistem</h2>
                            <pre style={{ background: '#000', padding: '10px', marginTop: '10px' }}>{this.state.error.toString()}</pre>
                            <button onClick={() => window.location.reload()} style={{ padding: '10px', marginTop: '20px', background: '#f87171', color: '#000', fontWeight: 'bold', border: 'none', borderRadius: '5px', cursor: 'pointer' }}>Muat Ulang Aplikasi</button>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }
        
        const L = window.lucide || window.lucideReact || window.LucideReact || {};
        const dummyIcon = () => <span style={{display:'inline-block', width:'14px', height:'14px', backgroundColor:'#475569', borderRadius:'50%', margin:'0 4px'}}></span>;
        
        const Upload = L.Upload || dummyIcon;
        const Video = L.Video || dummyIcon;
        const ImageIcon = L.Image || dummyIcon;
        const Wand2 = L.Wand2 || dummyIcon;
        const Copy = L.Copy || dummyIcon;
        const Check = L.Check || dummyIcon;
        const AlertCircle = L.AlertCircle || dummyIcon;
        const Loader2 = L.Loader2 || dummyIcon;
        const ListVideo = L.ListVideo || dummyIcon;
        const ShoppingBag = L.ShoppingBag || dummyIcon;
        const UserCircle = L.UserCircle || dummyIcon;
        const Captions = L.Captions || dummyIcon;
        const Mic = L.Mic || dummyIcon;
        const Download = L.Download || dummyIcon;
        const Film = L.Film || dummyIcon;
        const Sparkles = L.Sparkles || dummyIcon;
        const MapPin = L.MapPin || dummyIcon;
        const Palette = L.Palette || dummyIcon;
        const Volume2 = L.Volume2 || dummyIcon;
        const Fingerprint = L.Fingerprint || dummyIcon;
        const Hash = L.Hash || dummyIcon;
        const ChevronDown = L.ChevronDown || dummyIcon;
        const History = L.History || dummyIcon;
        const Trash2 = L.Trash2 || dummyIcon;
        const Settings = L.Settings || dummyIcon;

        let API_KEY = localStorage.getItem('gemini_api_key_azlan');
        if (!API_KEY) {
            API_KEY = prompt("🔐 SISTEM KEAMANAN\n\nMasukkan Gemini API Key Anda untuk mengaktifkan AI:");
            if (API_KEY) {
                localStorage.setItem('gemini_api_key_azlan', API_KEY);
            } else {
                alert("Peringatan: API Key kosong. AI tidak akan berjalan.");
            }
        }

        const resetApiKey = () => {
            if (confirm("Ingin memasukkan API Key baru? Web akan dimuat ulang.")) {
                localStorage.removeItem('gemini_api_key_azlan');
                window.location.reload();
            }
        };

        const SHARED_MODIFIER_OPTIONS = {
          gender: { label: 'Gender / Subjek', options: ['', '1boy, male', '1girl, female', 'androgynous', 'non-binary', 'a person'] },
          attire: { label: 'Gaya Pakaian', options: ['', 'Casual wear', 'Formal suit', 'Cyberpunk techwear', 'Fantasy armor', 'Traditional clothing', 'School uniform', 'Sportswear', 'Gothic fashion', 'Haute couture dress'] },
          background: { label: 'Latar Belakang', options: ['', 'Empty studio (White)', 'Empty studio (Dark)', 'Cyberpunk city street', 'Fantasy forest', 'Bedroom', 'Beach', 'Mountains', 'Outer space', 'Fashion runway', 'Ancient temple'] },
          artStyle: { label: 'Gaya Seni (Art Style)', options: ['', 'Photorealistic / Photography', 'Anime / Manga', '3D Render (Unreal Engine 5)', 'Oil painting', '2D Digital illustration', 'Cyberpunk aesthetic'] },
          lighting: { label: 'Pencahayaan', options: ['', 'Natural lighting (Daylight)', 'Studio lighting', 'Cinematic lighting', 'Neon lighting', 'Rim lighting', 'Golden hour', 'Moody / Dark', 'Soft diffuse lighting'] },
          colorTone: { label: 'Tone Warna', options: ['', 'Warm tone (Yellow/Orange)', 'Cool / Cold tone (Blue/Cyan)', 'Neutral tone', 'Sepia tone', 'High contrast', 'Desaturated / Muted'] }
        };

        const IMAGE_ONLY_OPTIONS = {
          bodyShape: { label: 'Bentuk Tubuh', options: ['Auto', 'Exact Replica (Kunci Proporsi Asli)'] },
          expression: { label: 'Ekspresi', options: ['', 'Neutral expression', 'Smiling', 'Laughing', 'Sad', 'Angry', 'Serious', 'Crying', 'Seductive smile'] },
          pose: { label: 'Pose', options: ['', 'Standing still', 'Sitting', 'Laying down', 'Walking', 'Running', 'Dynamic pose', 'High fashion pose', 'Vogue style', 'Exact Replica (Kunci Pose Asli)'] },
          shotType: { label: 'Tipe Shot', options: ['', 'Extreme Close-up', 'Close-up (Face)', 'Medium Shot (Chest up)', 'Cowboy Shot', 'Full Body', 'Wide shot'] },
          cameraAngle: { label: 'Angle Kamera', options: ['', 'Eye Level', 'High Angle (From Above)', 'Low Angle (From Below)', 'Dutch Angle (Tilted)', 'Bird\'s Eye View'] }
        };

        const VIDEO_MODIFIER_OPTIONS = {
          subjectAction: { label: 'Aksi Subjek', options: ['Auto', 'Diam (Statis)', 'Berbicara', 'Tersenyum Halus', 'Menoleh ke Kamera', 'Mengangguk', 'Berjalan'] },
          cameraMovement: { label: 'Gerakan Kamera', options: ['Auto', 'Statis', 'Zoom In Perlahan', 'Zoom Out', 'Pan Kanan', 'Pan Kiri', 'Mengitari Subjek (Orbit)'] },
          bgDynamics: { label: 'Dinamika Latar', options: ['Auto', 'Statis', 'Angin Sepoi-sepoi', 'Hujan', 'Salju Turun', 'Partikel Debu Mengambang', 'Lampu Berkedip'] }
        };

        const DEFAULT_SCRIPT_TEMPLATE = `[0-5 dtk] Hook: "Pernah ngerasa wajah kusam walau udah pakai skincare mahal?" (bingung dan frustrasi)
[5-15 dtk] Show: "Untung aku nemu serum ajaib ini!" (ceria dan antusias sambil memegang produk)
[15-25 dtk] Value: "Teksturnya super ringan, cepet nyerap, dan bikin glowing seharian." (Kamera zoom in perlahan ke produk, lalu ke wajah model yang bercahaya)
[25-30 dtk] CTA: "Buruan klik keranjang kuning sekarang mumpung lagi diskon!" (semangat menunjuk bawah layar)

Caption:
Rahasia glowing seharian tanpa ribet! ✨ Dapatkan diskon spesial hari ini aja. #SkincareRoutine #Glowing #RekomendasiSkincare`;

        function App() {
          const [appMode, setAppMode] = useState('promo');
          const [isProcessing, setIsProcessing] = useState(false);
          const [error, setError] = useState('');
          const [successMsg, setSuccessMsg] = useState('');
          
          const [copiedGlobalPrompt, setCopiedGlobalPrompt] = useState(false);
          const [copiedSceneIndexes, setCopiedSceneIndexes] = useState({});
          
          const [stdBaseImgPreview, setStdBaseImgPreview] = useState(null);
          const [stdBaseImgB64, setStdBaseImgB64] = useState('');
          const [stdFaceImgPreview, setStdFaceImgPreview] = useState(null);
          const [stdFaceImgB64, setStdFaceImgB64] = useState('');
          const [stdBasePrompt, setStdBasePrompt] = useState('');
          const [stdFinalPrompt, setStdFinalPrompt] = useState('');
          
          const [modifiers, setModifiers] = useState({
            ...Object.keys(SHARED_MODIFIER_OPTIONS).reduce((acc, key) => ({ ...acc, [key]: '' }), {}),
            ...Object.keys(IMAGE_ONLY_OPTIONS).reduce((acc, key) => ({ ...acc, [key]: '' }), {})
          });

          const [videoModifiers, setVideoModifiers] = useState({ subjectAction: 'Auto', cameraMovement: 'Auto', bgDynamics: 'Auto', faceLock: 100, seed: '' });
          const [audioConfig, setAudioConfig] = useState({ source: 'Tanpa Suara', dialogueText: '', emotion: 'Auto' });

          const [promoModelImg, setPromoModelImg] = useState(null);
          const [promoModelB64, setPromoModelB64] = useState('');
          const [promoProductImg, setPromoProductImg] = useState(null);
          const [promoProductB64, setPromoProductB64] = useState('');
          const [productName, setProductName] = useState('');
          const [promoFaceLock, setPromoFaceLock] = useState(100);
          const [scriptInput, setScriptInput] = useState(DEFAULT_SCRIPT_TEMPLATE);
          const [storyboardData, setStoryboardData] = useState(null);

          const stdBaseImgRef = useRef(null);
          const stdFaceImgRef = useRef(null);
          const promoModelRef = useRef(null);
          const promoProductRef = useRef(null);

          const [vaultHistory, setVaultHistory] = useState([]);

          useEffect(() => {
              const savedVault = localStorage.getItem('image_replica_vault');
              if (savedVault) setVaultHistory(JSON.parse(savedVault));
          }, []);

          // ============================================================================
          // LOGIKA SUPER PINTAR: AUTO-SEEKER MODEL
          // ============================================================================
          const callGeminiAPI = async (payload) => {
              // Daftar semua kemungkinan nama model yang diizinkan Google
              const modelsToTry = [
                  'gemini-1.5-flash-latest',
                  'gemini-1.5-flash',
                  'gemini-1.5-pro-latest',
                  'gemini-1.5-pro',
                  'gemini-2.0-flash-exp'
              ];

              let lastErrorMsg = '';

              for (let model of modelsToTry) {
                  try {
                      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify(payload)
                      });
                      
                      const data = await res.json();
                      
                      if (data.error) {
                          lastErrorMsg = data.error.message;
                          console.warn(`Model ${model} gagal:`, lastErrorMsg);
                          continue; // Gagal? Lanjut coba model berikutnya!
                      }
                      
                      console.log(`✅ BERHASIL MENGGUNAKAN MESIN: ${model}`);
                      return data; // Kalau berhasil, langsung kembalikan data dan stop pencarian
                      
                  } catch (err) {
                      lastErrorMsg = err.message;
                      console.warn(`Koneksi ke ${model} gagal:`, err.message);
                  }
              }

              // Jika semua mesin di atas gagal
              throw new Error("Gagal mencari model API yang cocok. Error terakhir: " + lastErrorMsg);
          };

          // ============================================================================
          // SISTEM VAULT
          // ============================================================================
          const saveToVault = (type, mainImg, secImg, title, resultText) => {
              try {
                  const newItem = {
                      id: Date.now(), date: new Date().toLocaleString('id-ID'), type: type,
                      mainImg: mainImg, secImg: secImg, title: title, resultText: resultText
                  };
                  let vault = localStorage.getItem('image_replica_vault');
                  vault = vault ? JSON.parse(vault) : [];
                  vault = [newItem, ...vault].slice(0, 5); 
                  localStorage.setItem('image_replica_vault', JSON.stringify(vault));
                  setVaultHistory(vault);
              } catch (e) {
                  console.error("Storage penuh:", e);
              }
          };

          const clearVault = () => {
              if (confirm("Yakin ingin menghapus semua riwayat proyek?")) {
                  localStorage.removeItem('image_replica_vault');
                  setVaultHistory([]);
              }
          };

          // ============================================================================
          // HANDLERS
          // ============================================================================
          const handleFileUpload = (e, setPreview, setB64) => {
            const file = e.target.files[0];
            if (!file) return;
            setPreview(URL.createObjectURL(file));
            const reader = new FileReader();
            reader.onloadend = () => setB64(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
          };

          const executeCopy = (text, callback) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(callback).catch(() => fallbackCopy(text, callback));
            } else { fallbackCopy(text, callback); }
          };

          const fallbackCopy = (text, callback) => {
            const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
            callback();
          };

          const triggerHaptic = () => { if (navigator.vibrate) navigator.vibrate(50); };

          // ============================================================================
          // LOGIKA ANALISIS
          // ============================================================================
          const analyzeStandardImage = async () => {
            if (!stdBaseImgB64) { setError('Silakan unggah Gambar Referensi Utama terlebih dahulu.'); return; }
            setIsProcessing(true); setError(''); setSuccessMsg('');

            let parts = [];
            const sysInstruction = "You are an expert Vision AI. Provide a highly detailed description of the subject's physical features, clothing materials, and background details. Format: English language, comma-separated keywords. No full sentences.";

            if (stdFaceImgB64) {
              parts = [
                { text: sysInstruction + " Combine body/clothes from Image 1 with facial features from Image 2." },
                { text: "Image 1 (Environment & Body):" }, { inlineData: { mimeType: 'image/jpeg', data: stdBaseImgB64 } },
                { text: "Image 2 (Specific Face):" }, { inlineData: { mimeType: 'image/jpeg', data: stdFaceImgB64 } }
              ];
            } else {
              parts = [{ text: sysInstruction }, { inlineData: { mimeType: 'image/jpeg', data: stdBaseImgB64 } }];
            }

            try {
              const data = await callGeminiAPI({ contents: [{ role: "user", parts }] });
              setStdBasePrompt((data.candidates?.[0]?.content?.parts?.[0]?.text || '').trim());
              setSuccessMsg('✅ Analisis Gambar Berhasil!');
              triggerHaptic();
              setTimeout(() => setSuccessMsg(''), 3000);
            } catch (err) { setError('Gagal menganalisis: ' + err.message); } 
            finally { setIsProcessing(false); }
          };

          const generateStandardPrompt = () => {
            let promptResult = '';
            if (appMode === 'image') {
              const parts = ["(masterpiece, best quality, ultra-detailed, 8k resolution, highres:1.3)"];
              if (modifiers.artStyle) parts.push(modifiers.artStyle);
              if (modifiers.shotType) parts.push(modifiers.shotType);
              if (modifiers.cameraAngle) parts.push(modifiers.cameraAngle);
              if (stdBasePrompt) parts.push(stdBasePrompt);
              if (modifiers.gender) parts.push(modifiers.gender);
              if (modifiers.expression) parts.push(`expression: ${modifiers.expression}`);
              if (modifiers.attire) parts.push(`outfit: ${modifiers.attire}`);
              if (modifiers.background) parts.push(`background: ${modifiers.background}`);
              if (modifiers.lighting) parts.push(`${modifiers.lighting}`);
              if (modifiers.colorTone) parts.push(`${modifiers.colorTone}`);
              parts.push("cinematic lighting, hyper-realistic, intricate textures, sharp focus");

              let exactReplicaActive = false;
              if (modifiers.pose === 'Exact Replica (Kunci Pose Asli)') exactReplicaActive = true;
              else if (modifiers.pose && modifiers.pose !== 'Auto') parts.push(`pose: ${modifiers.pose}`);
              if (modifiers.bodyShape === 'Exact Replica (Kunci Proporsi Asli)') exactReplicaActive = true;

              if (exactReplicaActive) parts.push("The subject MUST maintain the EXACT identical pose, posture, and precise body proportions/shape as the original reference image. STRICTLY lock the body type, do not reconstruct or alter the figure.");
              promptResult = parts.filter(Boolean).join(', ');
            } else {
              const action = videoModifiers.subjectAction === 'Auto' ? 'moving naturally' : videoModifiers.subjectAction;
              const cam = videoModifiers.cameraMovement === 'Auto' ? 'cinematic and steady' : videoModifiers.cameraMovement;
              const bgDyn = videoModifiers.bgDynamics === 'Auto' ? 'subtle natural' : videoModifiers.bgDynamics;
              
              let prompt = `A cinematic, continuous video of ${modifiers.gender||'a person'} wearing ${modifiers.attire||'their outfit'}. The subject is ${action}. Camera movement: ${cam}. The background is ${modifiers.background||'the existing environment'} with ${bgDyn} effects. The subject's face MUST be 100% strictly consistent with the provided reference image (Face Lock at ${videoModifiers.faceLock}%).`;
              
              if (audioConfig.source !== 'Tanpa Suara') prompt += ` They are speaking with a ${audioConfig.emotion === 'Auto' ? 'natural' : audioConfig.emotion} expression, featuring precise audio lip-sync.`;
              prompt += ` Art style: ${modifiers.artStyle||'cinematic hyper-realism'}. Lighting: ${modifiers.lighting||'cinematic lighting'}. Color Tone: ${modifiers.colorTone||'natural tone'}.`;
              if (stdBasePrompt) prompt += `\n\n(Base Visual Reference: ${stdBasePrompt})`;
              promptResult = prompt;
            }
            
            setStdFinalPrompt(promptResult);
            
            executeCopy(promptResult, () => {
                setCopiedGlobalPrompt(true);
                setSuccessMsg('✅ Prompt Dibuat & Tersalin Otomatis!');
                triggerHaptic();
                saveToVault(appMode, stdBaseImgPreview, stdFaceImgPreview, `Prompt ${appMode.toUpperCase()}`, promptResult);
                setTimeout(() => { setCopiedGlobalPrompt(false); setSuccessMsg(''); }, 3000);
            });
          };

          const generateVideoStoryboard = async () => {
            if (!scriptInput.trim()) { setError('Naskah tidak boleh kosong.'); return; }
            if (!productName.trim()) { setError('Nama produk wajib diisi.'); return; }
            setIsProcessing(true); setError(''); setSuccessMsg(''); setStoryboardData(null);

            const systemPrompt = `You are an expert AI Video Director. Process the user's affiliate marketing script into a highly structured Storyboard. Analyze segments (Hook, Show, Value, CTA). CRITICAL INSTRUCTIONS: 1. Visual prompts MUST be in English. 2. EVERY visual prompt MUST end with: "Model face MUST be 100% identical to the reference image (Face Lock at ${promoFaceLock}%). The product ${productName} must strictly maintain its original label, text, and shape." 3. Extract exact Indonesian audio script.`;

            const parts = [{ text: systemPrompt }, { text: `Script:\n${scriptInput}` }];
            if (promoModelB64) parts.push({ text: "Image 1 (Model Reference):" }, { inlineData: { mimeType: 'image/jpeg', data: promoModelB64 } });
            if (promoProductB64) parts.push({ text: "Image 2 (Product Reference):" }, { inlineData: { mimeType: 'image/jpeg', data: promoProductB64 } });

            const payload = {
              contents: [{ role: "user", parts }],
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "OBJECT",
                  properties: {
                    scenes: { type: "ARRAY", items: { type: "OBJECT", properties: { segment: { type: "STRING" }, audio: { type: "STRING" }, detectedTone: { type: "STRING" }, duration: { type: "STRING" }, visualPrompt: { type: "STRING" } }, required: ["segment", "audio", "detectedTone", "duration", "visualPrompt"] } },
                    caption: { type: "STRING" }
                  }, required: ["scenes", "caption"]
                }
              }
            };

            try {
              const data = await callGeminiAPI(payload);
              const resultData = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text);
              setStoryboardData(resultData);
              setSuccessMsg('✅ Storyboard Berhasil Dibuat!');
              triggerHaptic();
              saveToVault('promo', promoModelImg, promoProductImg, productName, resultData.caption || "Storyboard Promo");
              setTimeout(() => setSuccessMsg(''), 3000);
            } catch (err) {
              setError('Gagal memproses naskah: ' + err.message); 
            } finally { setIsProcessing(false); }
          };

          const handleCopySingleScene = (scene, index) => {
            const textToCopy = `--VISUAL INSTRUCTIONS--\n${scene.visualPrompt}\n\n--AUDIO & LIP-SYNC SCRIPT--\n${scene.audio}`;
            executeCopy(textToCopy, () => {
              setCopiedSceneIndexes(prev => ({ ...prev, [index]: true }));
              triggerHaptic();
              setTimeout(() => setCopiedSceneIndexes(prev => ({ ...prev, [index]: false })), 2000);
            });
          };

          // ============================================================================
          // RENDER UI
          // ============================================================================
          return (
            <div className="min-h-screen text-slate-200 font-sans p-4 md:p-8">
              <div className="max-w-7xl mx-auto space-y-6">
                
                {/* HEADER */}
                <div className="bg-slate-900 rounded-2xl p-5 border border-slate-800 flex flex-col xl:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-4">
                    <div className="bg-gradient-to-br from-indigo-500 via-purple-500 to-rose-500 p-3 rounded-xl text-white shadow-lg"><Sparkles size={28} /></div>
                    <div><h1 className="text-2xl font-black text-white tracking-tight">AI Master Prompt <span className="text-xs bg-rose-600 text-white px-2 py-0.5 rounded-full ml-1 align-top">PRO MAX</span></h1><p className="text-sm text-slate-400">Pusat Kreatif Visual & Naskah</p></div>
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="flex gap-1 bg-slate-950 p-1.5 rounded-xl border border-slate-800">
                      <button onClick={() => setAppMode('image')} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold text-sm transition-all ${appMode === 'image' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}><ImageIcon size={16}/> Gambar</button>
                      <button onClick={() => setAppMode('video')} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold text-sm transition-all ${appMode === 'video' ? 'bg-purple-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}><Film size={16}/> Video</button>
                      <button onClick={() => setAppMode('promo')} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold text-sm transition-all ${appMode === 'promo' ? 'bg-rose-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}><ListVideo size={16}/> Promo</button>
                    </div>
                    <button onClick={resetApiKey} className="p-2.5 bg-slate-950 border border-slate-800 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white transition-colors" title="Pengaturan / Ganti API Key">
                        <Settings size={20} />
                    </button>
                  </div>
                </div>

                {error && <div className="bg-red-900/50 text-red-300 p-4 rounded-xl flex items-center border border-red-900 animate-in slide-in-from-top-2"><AlertCircle className="mr-2 flex-shrink-0"/> <p className="text-sm">{error}</p></div>}
                {successMsg && <div className="bg-emerald-900/50 text-emerald-400 font-bold p-4 rounded-xl flex items-center border border-emerald-900 shadow-lg shadow-emerald-900/20 animate-in slide-in-from-top-2"><Check className="mr-2"/> {successMsg}</div>}

                {/* MODE: GAMBAR & VIDEO BIASA */}
                {(appMode === 'image' || appMode === 'video') && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-in fade-in duration-300">
                    <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 space-y-4 shadow-xl">
                      <h2 className="text-lg font-bold text-white mb-2 flex items-center gap-2"><MapPin size={18} className="text-indigo-400"/> 1. Referensi Visual</h2>
                      <div onClick={() => stdBaseImgRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950 p-4 text-center cursor-pointer rounded-xl hover:border-slate-500 transition-all overflow-hidden">
                        <input type="file" ref={stdBaseImgRef} onChange={(e) => handleFileUpload(e, setStdBaseImgPreview, setStdBaseImgB64)} accept="image/*" className="hidden" />
                        {stdBaseImgPreview ? <img src={stdBaseImgPreview} className="w-full h-48 object-contain rounded-lg" /> : <div className="py-8 text-slate-400 flex flex-col items-center"><Upload size={24} className="mb-2"/>Klik Unggah Referensi Utama</div>}
                      </div>
                      <div onClick={() => stdFaceImgRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950 p-3 text-center cursor-pointer rounded-xl hover:border-slate-500 transition-all overflow-hidden">
                        <input type="file" ref={stdFaceImgRef} onChange={(e) => handleFileUpload(e, setStdFaceImgPreview, setStdFaceImgB64)} accept="image/*" className="hidden" />
                        {stdFaceImgPreview ? <img src={stdFaceImgPreview} className="w-full h-32 object-contain rounded-lg" /> : <div className="text-sm font-bold text-slate-500 py-2 flex items-center justify-center gap-2"><Fingerprint size={16}/> + Tambah Wajah Opsional</div>}
                      </div>
                      <button onClick={analyzeStandardImage} disabled={!stdBaseImgB64 || isProcessing} className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3.5 rounded-xl transition-colors flex justify-center items-center gap-2 border border-slate-600 disabled:opacity-50">
                          {isProcessing ? <><Loader2 size={18} className="animate-spin"/> Menganalisis...</> : <><Wand2 size={18}/> Analisis Gambar</>}
                      </button>
                      {stdBasePrompt && <p className="text-xs text-slate-400 mt-2 bg-slate-950 p-3 rounded-lg border border-slate-800 leading-relaxed"><span className="font-bold text-indigo-400 block mb-1">Hasil Base Prompt:</span>{stdBasePrompt}</p>}
                    </div>

                    <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-xl">
                      <h2 className="text-lg font-bold text-white mb-4 flex items-center gap-2"><Palette size={18} className="text-indigo-400"/> 2. Modifikasi Global</h2>
                      <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                        {Object.entries(SHARED_MODIFIER_OPTIONS).map(([key, config]) => (
                          <div key={key}>
                            <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-tight">{config.label}</label>
                            <div className="relative">
                                <select value={modifiers[key]} onChange={(e) => setModifiers(prev => ({ ...prev, [key]: e.target.value }))} className="w-full appearance-none bg-slate-950 border border-slate-700 text-xs rounded-lg pl-2 pr-7 py-2.5 text-slate-200 outline-none focus:border-indigo-500">
                                {config.options.map((opt, i) => <option key={i} value={opt}>{opt || '-- Auto --'}</option>)}
                                </select>
                                <ChevronDown size={14} className="absolute right-2 top-2.5 text-slate-500 pointer-events-none"/>
                            </div>
                          </div>
                        ))}
                      </div>
                      
                      <button onClick={generateStandardPrompt} className={`w-full mt-6 text-white font-black py-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 active:scale-95 ${appMode === 'image' ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-900/30' : 'bg-purple-600 hover:bg-purple-700 shadow-purple-900/30'}`}>
                          <Sparkles size={18}/> BUAT & SALIN PROMPT
                      </button>
                      <textarea readOnly value={stdFinalPrompt} className="w-full h-32 mt-4 bg-slate-950 border border-slate-700 text-slate-300 p-3 rounded-lg text-xs resize-none font-mono" placeholder="Hasil prompt akan otomatis tersalin ke clipboard..."/>
                    </div>
                  </div>
                )}

                {/* MODE: VIDEO PROMOSI */}
                {appMode === 'promo' && (
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-in fade-in duration-300">
                    <div className="lg:col-span-4 space-y-6">
                      <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-xl">
                        <h2 className="text-lg font-bold text-white mb-4 flex items-center gap-2"><UserCircle size={18} className="text-rose-400"/> 1. Referensi Promosi</h2>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                          <div onClick={() => promoModelRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950 h-28 flex flex-col items-center justify-center text-center cursor-pointer rounded-lg relative overflow-hidden group hover:border-rose-500 transition-colors">
                            <input type="file" ref={promoModelRef} onChange={(e) => handleFileUpload(e, setPromoModelImg, setPromoModelB64)} accept="image/*" className="hidden" />
                            {promoModelImg ? <img src={promoModelImg} className="absolute inset-0 w-full h-full object-cover opacity-60" /> : <><UserCircle size={20} className="text-slate-500 mb-1"/><span className="text-[10px] font-bold text-slate-400">Foto Model</span></>}
                          </div>
                          <div onClick={() => promoProductRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950 h-28 flex flex-col items-center justify-center text-center cursor-pointer rounded-lg relative overflow-hidden group hover:border-rose-500 transition-colors">
                            <input type="file" ref={promoProductRef} onChange={(e) => handleFileUpload(e, setPromoProductImg, setPromoProductB64)} accept="image/*" className="hidden" />
                            {promoProductImg ? <img src={promoProductImg} className="absolute inset-0 w-full h-full object-cover opacity-60" /> : <><ShoppingBag size={20} className="text-slate-500 mb-1"/><span className="text-[10px] font-bold text-slate-400">Foto Produk</span></>}
                          </div>
                        </div>
                        <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-tight">Nama Produk (Wajib)</label>
                        <input type="text" placeholder="Contoh: Skintific Serum" value={productName} onChange={(e) => setProductName(e.target.value)} className="w-full bg-slate-950 border border-slate-700 text-sm rounded-lg p-2.5 text-white mb-4 outline-none focus:border-rose-500" />
                        
                        <label className="text-xs font-bold text-slate-400 flex justify-between mb-2"><span>Face Lock</span><span className="text-rose-400 bg-rose-950/50 px-2 rounded">{promoFaceLock}%</span></label>
                        <input type="range" min="0" max="100" value={promoFaceLock} onChange={(e) => setPromoFaceLock(e.target.value)} className="w-full accent-rose-500 h-1.5 bg-slate-800 rounded-lg appearance-none" />
                      </div>
                      
                      <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-xl">
                        <h2 className="text-lg font-bold text-white mb-2 flex items-center gap-2"><Captions size={18} className="text-rose-400"/> 2. Masukkan Naskah</h2>
                        <textarea value={scriptInput} onChange={(e) => setScriptInput(e.target.value)} className="w-full h-44 bg-slate-950 border border-slate-700 p-3 rounded-lg text-xs text-slate-300 outline-none focus:border-rose-500" placeholder="Paste naskah promosi Anda di sini..." />
                        <button onClick={generateVideoStoryboard} disabled={isProcessing} className="w-full mt-4 bg-gradient-to-r from-rose-600 to-orange-600 hover:from-rose-500 hover:to-orange-500 text-white font-black py-4 rounded-xl disabled:opacity-50 transition-all shadow-lg shadow-rose-900/30 flex items-center justify-center gap-2 active:scale-95">
                          {isProcessing ? <><Loader2 size={18} className="animate-spin"/> MEMPROSES...</> : <><Wand2 size={18}/> BUAT STORYBOARD</>}
                        </button>
                      </div>
                    </div>
                    
                    <div className="lg:col-span-8 bg-slate-900 rounded-2xl p-6 border border-slate-800 min-h-[500px] shadow-xl">
                      <h2 className="text-lg font-bold text-white mb-4 flex items-center justify-between">
                        <span className="flex items-center gap-2"><Video size={18} className="text-rose-400"/> Hasil Auto-Storyboard AI</span>
                        {storyboardData && <span className="text-[10px] bg-emerald-900/50 text-emerald-400 px-2 py-1 rounded font-bold uppercase tracking-wider">Tersimpan di Riwayat</span>}
                      </h2>
                      
                      {storyboardData ? (
                        <div className="space-y-4 animate-in slide-in-from-bottom duration-500">
                          {storyboardData.scenes.map((scene, idx) => (
                            <div key={idx} className="bg-slate-950 border border-slate-800 rounded-xl p-4 flex flex-col gap-2 relative group hover:border-slate-600 transition-colors">
                              <div className="flex justify-between items-center">
                                <span className="text-rose-400 font-black text-sm uppercase tracking-wider">{scene.segment} <span className="text-slate-500 font-normal ml-1">({scene.duration})</span></span>
                                <span className="bg-slate-800 px-2 py-1 text-[10px] text-orange-400 rounded font-bold uppercase">Nada: {scene.detectedTone}</span>
                              </div>
                              <textarea readOnly value={`--VISUAL INSTRUCTIONS--\n${scene.visualPrompt}\n\n--AUDIO & LIP-SYNC SCRIPT--\n${scene.audio}`} className="w-full h-28 bg-slate-900/50 p-3 text-xs text-slate-300 border border-slate-800/50 rounded mt-2 resize-none outline-none font-mono" />
                              <button onClick={() => handleCopySingleScene(scene, idx)} className={`self-end flex items-center gap-2 px-4 py-2 rounded-lg font-bold text-xs transition-all border shadow-md active:scale-95 ${copiedSceneIndexes[idx] ? 'bg-emerald-600/20 text-emerald-400 border-emerald-900 shadow-none' : 'bg-slate-800 text-slate-200 border-slate-700 hover:bg-slate-700'}`}>
                                {copiedSceneIndexes[idx] ? <Check size={14} /> : <Copy size={14} />} 
                                {copiedSceneIndexes[idx] ? 'Tersalin!' : 'Copy Prompt Visual + Audio'}
                              </button>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="flex flex-col items-center justify-center h-full text-slate-500 opacity-50 pb-10">
                          <ListVideo size={56} className="mb-4 text-slate-600" />
                          <p className="text-center font-bold text-lg mb-1">Storyboard Kosong</p>
                          <p className="text-center text-sm">Isi data referensi dan klik tombol proses di panel kiri.</p>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* ============================================================================
                    PROJECT VAULT (RIWAYAT PROYEK)
                ============================================================================ */}
                <div className="mt-12 pt-8 border-t border-slate-800/50">
                    <div className="flex items-center justify-between mb-6">
                        <h2 className="text-xl font-black text-white flex items-center gap-2"><History className="text-sky-400"/> Riwayat Proyek Terbaru</h2>
                        {vaultHistory.length > 0 && (
                            <button onClick={clearVault} className="text-xs font-bold text-red-400 hover:text-red-300 flex items-center gap-1 bg-red-950/30 px-3 py-1.5 rounded-lg transition-colors"><Trash2 size={14}/> Hapus Semua</button>
                        )}
                    </div>
                    
                    {vaultHistory.length === 0 ? (
                        <div className="bg-slate-900/50 rounded-2xl p-8 border border-slate-800 text-center text-slate-500 text-sm font-medium">Belum ada riwayat proyek. Hasil prompt Anda akan tersimpan otomatis di sini.</div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {vaultHistory.map((item) => (
                                <div key={item.id} className="bg-slate-900 rounded-2xl p-4 border border-slate-800 hover:border-slate-600 transition-colors group cursor-pointer" onClick={() => alert("Fitur Load Project: Segera hadir! \n\n(Data Anda sudah tersimpan dengan aman di memori HP Anda).")}>
                                    <div className="flex gap-2 mb-3">
                                        <div className="w-16 h-16 bg-slate-950 rounded-lg border border-slate-800 overflow-hidden shrink-0 flex items-center justify-center relative">
                                            {item.mainImg ? <img src={item.mainImg} className="w-full h-full object-cover opacity-80" /> : <ImageIcon size={20} className="text-slate-600"/>}
                                            <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"><History size={16} className="text-white"/></div>
                                        </div>
                                        <div className="flex flex-col justify-center overflow-hidden">
                                            <span className={`text-[10px] font-black uppercase tracking-wider px-2 py-0.5 rounded w-max mb-1 ${item.type === 'promo' ? 'bg-rose-950 text-rose-400' : 'bg-indigo-950 text-indigo-400'}`}>{item.type}</span>
                                            <span className="text-sm font-bold text-white truncate w-full">{item.title}</span>
                                            <span className="text-[10px] text-slate-500">{item.date}</span>
                                        </div>
                                    </div>
                                    <p className="text-[11px] text-slate-400 line-clamp-2 bg-slate-950 p-2 rounded-lg border border-slate-800 font-mono leading-tight">{item.resultText}</p>
                                </div>
                            ))}
                        </div>
                    )}
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
