<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Prompt Replica - Azlan Noor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- SISTEM IKON & FALLBACK ---
        const L = window.lucide || window.lucideReact || window.LucideReact || {};
        const { Image: ImageIcon, Wand2, Copy, Check, AlertCircle, Loader2, Upload, Sparkles, Settings, History, Trash2, Fingerprint, Palette, ChevronDown } = L;

        function App() {
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [baseImg, setBaseImg] = useState({ preview: null, b64: '' });
            const [faceImg, setFaceImg] = useState({ preview: null, b64: '' });
            const [analyzedText, setAnalyzedText] = useState('');
            const [finalPrompt, setFinalPrompt] = useState('');
            const [vault, setVault] = useState([]);

            // Opsi Modifikasi
            const [mods, setMods] = useState({ style: '', lighting: '', tone: '', shot: '', pose: '' });

            const API_KEY = localStorage.getItem('gemini_api_key_azlan');

            useEffect(() => {
                const saved = localStorage.getItem('image_vault_focused');
                if (saved) setVault(JSON.parse(saved));
            }, []);

            const handleUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    const data = { preview: URL.createObjectURL(file), b64: reader.result.split(',')[1] };
                    type === 'base' ? setBaseImg(data) : setFaceImg(data);
                };
                reader.readAsDataURL(file);
            };

            const callAI = async () => {
                if (!baseImg.b64) return setError('Unggah foto referensi dulu!');
                setIsProcessing(true); setError(''); setSuccess('');

                const payload = {
                    contents: [{
                        role: "user",
                        parts: [
                            { text: "Describe this image for AI image generation. Focus on subject features, outfit materials, exact pose, and background details. Use descriptive English keywords, comma separated." },
                            { inlineData: { mimeType: "image/jpeg", data: baseImg.b64 } }
                        ]
                    }]
                };

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    const result = data.candidates[0].content.parts[0].text;
                    setAnalyzedText(result);
                    setSuccess('✅ Analisis Gambar Berhasil!');
                } catch (e) { setError(e.message); }
                finally { setIsProcessing(false); }
            };

            const generateFinal = () => {
                const combined = `(masterpiece, highres), ${analyzedText}, ${Object.values(mods).filter(Boolean).join(', ')}, cinematic lighting, 8k, highly detailed`.replace(/,\s*,/g, ',');
                setFinalPrompt(combined);
                navigator.clipboard.writeText(combined);
                setSuccess('✅ Prompt Tersalin Otomatis!');
                
                // Save to Vault
                const newVault = [{ id: Date.now(), img: baseImg.preview, prompt: combined }, ...vault].slice(0, 10);
                setVault(newVault);
                localStorage.setItem('image_vault_focused', JSON.stringify(newVault));
            };

            return (
                <div className="max-w-5xl mx-auto p-6 space-y-8">
                    {/* Header */}
                    <div className="flex justify-between items-center bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-3 rounded-2xl"><ImageIcon className="text-white"/></div>
                            <div>
                                <h1 className="text-xl font-black">Prompt Replica AI</h1>
                                <p className="text-xs text-slate-500 font-bold uppercase tracking-widest">Image Focus Edition</p>
                            </div>
                        </div>
                        <button onClick={() => { localStorage.removeItem('gemini_api_key_azlan'); window.location.reload(); }} className="p-3 bg-slate-950 rounded-xl border border-slate-800 hover:text-indigo-400"><Settings size={20}/></button>
                    </div>

                    {error && <div className="bg-red-950/50 border border-red-900 text-red-400 p-4 rounded-2xl text-sm">{error}</div>}
                    {success && <div className="bg-emerald-950/50 border border-emerald-900 text-emerald-400 p-4 rounded-2xl text-sm font-bold">{success}</div>}

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        {/* KIRI: INPUT */}
                        <div className="space-y-6">
                            <div className="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl space-y-4">
                                <h3 className="font-bold flex items-center gap-2"><Upload size={18}/> Referensi Utama</h3>
                                <div onClick={() => document.getElementById('baseIn').click()} className="aspect-video bg-slate-950 border-2 border-dashed border-slate-800 rounded-2xl flex items-center justify-center cursor-pointer overflow-hidden relative">
                                    <input id="baseIn" type="file" className="hidden" onChange={(e) => handleUpload(e, 'base')} />
                                    {baseImg.preview ? <img src={baseImg.preview} className="w-full h-full object-cover" /> : <span className="text-slate-600 text-xs font-bold">KLIK UNTUK UNGGAH</span>}
                                </div>
                                <button onClick={callAI} disabled={isProcessing} className="w-full bg-slate-800 py-4 rounded-2xl font-black text-xs tracking-tighter hover:bg-slate-700 transition-all flex items-center justify-center gap-2">
                                    {isProcessing ? <Loader2 className="animate-spin"/> : <Wand2/>} ANALISIS CIRI VISUAL
                                </button>
                                {analyzedText && <div className="p-4 bg-slate-950 rounded-xl text-[10px] text-slate-500 font-mono leading-relaxed">{analyzedText}</div>}
                            </div>
                        </div>

                        {/* KANAN: OUTPUT */}
                        <div className="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl space-y-6">
                            <h3 className="font-bold flex items-center gap-2"><Palette size={18}/> Kustomisasi Prompt</h3>
                            <div className="grid grid-cols-2 gap-4 text-xs">
                                {['Style', 'Lighting', 'Tone', 'Shot'].map(f => (
                                    <div key={f}>
                                        <label className="block mb-2 text-slate-500 font-bold uppercase text-[9px]">{f}</label>
                                        <select className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl outline-none" onChange={(e) => setMods({...mods, [f.toLowerCase()]: e.target.value})}>
                                            <option value="">-- Auto --</option>
                                            <option value="Photorealistic">Photorealistic</option>
                                            <option value="Cinematic Studio">Studio Lighting</option>
                                            <option value="8k resolution">Ultra Detail</option>
                                        </select>
                                    </div>
                                ))}
                            </div>
                            <button onClick={generateFinal} className="w-full bg-indigo-600 py-5 rounded-2xl font-black text-sm shadow-xl shadow-indigo-900/40 active:scale-95 transition-all">BUAT & SALIN MASTER PROMPT</button>
                            <textarea readOnly value={finalPrompt} className="w-full h-40 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-xs text-indigo-300 font-mono resize-none" placeholder="Hasil prompt akhir..." />
                        </div>
                    </div>

                    {/* VAULT */}
                    <div className="pt-10 border-t border-slate-900">
                        <h2 className="text-xl font-black flex items-center gap-2 mb-6"><History className="text-sky-400"/> Riwayat Proyek</h2>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                            {vault.map(h => (
                                <div key={h.id} className="bg-slate-900 p-3 rounded-2xl border border-slate-800 group transition-all">
                                    <img src={h.img} className="aspect-square rounded-xl object-cover mb-2 opacity-50 group-hover:opacity-100 transition-opacity" />
                                    <p className="text-[9px] text-slate-500 truncate font-mono">{h.prompt}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
