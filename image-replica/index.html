<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Replica AI - Azlan Noor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 1. Kenalkan fungsi React
        const { useState, useRef } = React;
        
        // 2. PERBAIKAN FATAL: Nama variabel yang benar adalah lucideReact
        const { Upload, Video, Image: ImageIcon, Wand2, Copy, Check, AlertCircle, Loader2, ListVideo, ShoppingBag, UserCircle, Captions, Mic, Download, Film, Sparkles, MapPin, Palette, Volume2, Fingerprint, Hash, ChevronDown } = LucideReact;

        // 3. Sistem Keamanan API Key Pribadi
        let API_KEY = localStorage.getItem('gemini_api_key_azlan');
        if (!API_KEY) {
            API_KEY = prompt("🔐 Sistem Keamanan: Masukkan Gemini API Key Anda untuk mengaktifkan otak AI:");
            if (API_KEY) {
                localStorage.setItem('gemini_api_key_azlan', API_KEY);
            } else {
                alert("Peringatan: API Key kosong. AI tidak akan merespon perintah Anda.");
            }
        }

// ============================================================================
// KONSTANTA & OPSI DROPDOWN (MODE GAMBAR & VIDEO BIASA)
// ============================================================================
const SHARED_MODIFIER_OPTIONS = {
  gender: { label: 'Gender / Subjek', options: ['', '1boy, male', '1girl, female', 'androgynous', 'non-binary', 'a person'] },
  attire: { label: 'Gaya Pakaian', options: ['', 'Casual wear', 'Formal suit', 'Cyberpunk techwear', 'Fantasy armor', 'Traditional clothing', 'School uniform', 'Sportswear', 'Gothic fashion', 'Haute couture dress'] },
  background: { label: 'Latar Belakang', options: ['', 'Empty studio (White)', 'Empty studio (Dark)', 'Cyberpunk city street', 'Fantasy forest', 'Bedroom', 'Beach', 'Mountains', 'Outer space', 'Fashion runway', 'Ancient temple'] },
  artStyle: { label: 'Gaya Seni (Art Style)', options: ['', 'Photorealistic / Photography', 'Anime / Manga', '3D Render (Unreal Engine 5)', 'Oil painting', '2D Digital illustration', 'Cyberpunk aesthetic'] },
  lighting: { label: 'Pencahayaan', options: ['', 'Natural lighting (Daylight)', 'Studio lighting', 'Cinematic lighting', 'Neon lighting', 'Rim lighting', 'Golden hour', 'Moody / Dark', 'Soft diffuse lighting'] },
  colorTone: { label: 'Tone Warna', options: ['', 'Warm tone (Yellow/Orange)', 'Cool / Cold tone (Blue/Cyan)', 'Neutral tone', 'Sepia tone', 'High contrast', 'Desaturated / Muted'] }
};

const IMAGE_ONLY_OPTIONS = {
  bodyShape: { label: 'Bentuk Tubuh', options: ['Auto', 'Exact Replica (Kunci Proporsi Asli)'] }, // Opsi baru
  expression: { label: 'Ekspresi', options: ['', 'Neutral expression', 'Smiling', 'Laughing', 'Sad', 'Angry', 'Serious', 'Crying', 'Seductive smile'] },
  pose: { label: 'Pose', options: ['', 'Standing still', 'Sitting', 'Laying down', 'Walking', 'Running', 'Dynamic pose', 'High fashion pose', 'Vogue style', 'Exact Replica (Kunci Pose Asli)'] }, // Opsi baru ditambahkan
  shotType: { label: 'Tipe Shot', options: ['', 'Extreme Close-up', 'Close-up (Face)', 'Medium Shot (Chest up)', 'Cowboy Shot', 'Full Body', 'Wide shot'] },
  cameraAngle: { label: 'Angle Kamera', options: ['', 'Eye Level', 'High Angle (From Above)', 'Low Angle (From Below)', 'Dutch Angle (Tilted)', 'Bird\'s Eye View'] }
};

const VIDEO_MODIFIER_OPTIONS = {
  subjectAction: { label: 'Aksi Subjek', options: ['Auto', 'Diam (Statis)', 'Berbicara', 'Tersenyum Halus', 'Menoleh ke Kamera', 'Mengangguk', 'Berjalan'] },
  cameraMovement: { label: 'Gerakan Kamera', options: ['Auto', 'Statis', 'Zoom In Perlahan', 'Zoom Out', 'Pan Kanan', 'Pan Kiri', 'Mengitari Subjek (Orbit)'] },
  bgDynamics: { label: 'Dinamika Latar', options: ['Auto', 'Statis', 'Angin Sepoi-sepoi', 'Hujan', 'Salju Turun', 'Partikel Debu Mengambang', 'Lampu Berkedip'] }
};

const AUDIO_EMOTIONS = ['Auto', 'Datar', 'Ceria', 'Antusias', 'Sedih', 'Serius', 'Berbisik'];

// ============================================================================
// KONSTANTA MODE VIDEO PROMOSI
// ============================================================================
const DEFAULT_SCRIPT_TEMPLATE = `[0-5 dtk] Hook: "Pernah ngerasa wajah kusam walau udah pakai skincare mahal?" (bingung dan frustrasi)
[5-15 dtk] Show: "Untung aku nemu serum ajaib ini!" (ceria dan antusias sambil memegang produk)
[15-25 dtk] Value: "Teksturnya super ringan, cepet nyerap, dan bikin glowing seharian." (Kamera zoom in perlahan ke produk, lalu ke wajah model yang bercahaya)
[25-30 dtk] CTA: "Buruan klik keranjang kuning sekarang mumpung lagi diskon!" (semangat menunjuk bawah layar)

Caption:
Rahasia glowing seharian tanpa ribet! ✨ Dapatkan diskon spesial hari ini aja. #SkincareRoutine #Glowing #RekomendasiSkincare`;

const DEFAULT_TONES = ['Natural / Netral', 'Ceria & Antusias', 'Serius & Profesional', 'Sedih / Empati', 'Tegas & Berwibawa', 'Santai / Kasual'];

function App() {
  const [appMode, setAppMode] = useState('promo'); // Default ke promo sesuai fokus pengembangan
  
  // GLOBAL STATE
  const [isProcessing, setIsProcessing] = useState(false);
  const [error, setError] = useState('');
  const [copiedGlobalPrompt, setCopiedGlobalPrompt] = useState(false);
  const [copiedSceneIndexes, setCopiedSceneIndexes] = useState({}); // Lacak status copy per baris
  const [isDownloaded, setIsDownloaded] = useState(false);

  // ============================================================================
  // STATE: MODE GAMBAR & VIDEO BIASA
  // ============================================================================
  const [stdBaseImgPreview, setStdBaseImgPreview] = useState(null);
  const [stdBaseImgB64, setStdBaseImgB64] = useState('');
  const [stdFaceImgPreview, setStdFaceImgPreview] = useState(null);
  const [stdFaceImgB64, setStdFaceImgB64] = useState('');
  const [stdBasePrompt, setStdBasePrompt] = useState('');
  const [stdFinalPrompt, setStdFinalPrompt] = useState('');
  
  const [modifiers, setModifiers] = useState({
    ...Object.keys(SHARED_MODIFIER_OPTIONS).reduce((acc, key) => ({ ...acc, [key]: '' }), {}),
    ...Object.keys(IMAGE_ONLY_OPTIONS).reduce((acc, key) => ({ ...acc, [key]: '' }), {})
  });

  const [videoModifiers, setVideoModifiers] = useState({
    subjectAction: 'Auto', cameraMovement: 'Auto', bgDynamics: 'Auto', faceLock: 100, seed: ''
  });

  const [audioConfig, setAudioConfig] = useState({
    source: 'Tanpa Suara', dialogueText: '', emotion: 'Auto'
  });

  const stdBaseImgRef = useRef(null);
  const stdFaceImgRef = useRef(null);

  // ============================================================================
  // STATE: MODE VIDEO PROMOSI
  // ============================================================================
  const [promoModelImg, setPromoModelImg] = useState(null);
  const [promoModelB64, setPromoModelB64] = useState('');
  const [promoProductImg, setPromoProductImg] = useState(null);
  const [promoProductB64, setPromoProductB64] = useState('');
  
  const [productName, setProductName] = useState('');
  const [promoFaceLock, setPromoFaceLock] = useState(100);
  const [defaultTone, setDefaultTone] = useState(DEFAULT_TONES[0]);
  const [scriptInput, setScriptInput] = useState(DEFAULT_SCRIPT_TEMPLATE);
  const [storyboardData, setStoryboardData] = useState(null);

  const promoModelRef = useRef(null);
  const promoProductRef = useRef(null);

  // ============================================================================
  // HANDLERS UMUM
  // ============================================================================
  const handleFileUpload = (e, setPreview, setB64) => {
    const file = e.target.files[0];
    if (!file) return;
    setPreview(URL.createObjectURL(file));
    const reader = new FileReader();
    reader.onloadend = () => setB64(reader.result.split(',')[1]);
    reader.readAsDataURL(file);
  };

  const executeCopy = (text, callback) => {
    navigator.clipboard.writeText(text).catch(() => {
        const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    });
    callback();
  };

  // ============================================================================
  // LOGIKA AI: MODE GAMBAR & VIDEO BIASA
  // ============================================================================
  const analyzeStandardImage = async () => {
    if (!stdBaseImgB64) { setError('Silakan unggah Gambar Referensi Utama terlebih dahulu.'); return; }
    setIsProcessing(true); setError('');

    let parts = [];
    const sysInstruction = `You are an expert Vision AI. Provide a highly detailed description of the subject's physical features, clothing materials, and background details. Format: English language, comma-separated keywords. No full sentences.`;

    if (stdFaceImgB64) {
      parts = [
        { text: sysInstruction + " Combine body/clothes from Image 1 with facial features from Image 2." },
        { text: "Image 1 (Environment & Body):" }, { inlineData: { mimeType: 'image/jpeg', data: stdBaseImgB64 } },
        { text: "Image 2 (Specific Face):" }, { inlineData: { mimeType: 'image/jpeg', data: stdFaceImgB64 } }
      ];
    } else {
      parts = [{ text: sysInstruction }, { inlineData: { mimeType: 'image/jpeg', data: stdBaseImgB64 } }];
    }

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, 
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ role: "user", parts }] }) });
      const data = await res.json();
      setStdBasePrompt((data.candidates?.[0]?.content?.parts?.[0]?.text || '').trim());
    } catch (err) { setError('Gagal menganalisis gambar.'); } 
    finally { setIsProcessing(false); }
  };

  const generateStandardPrompt = () => {
    if (appMode === 'image') {
      const parts = [];
      parts.push("(masterpiece, best quality, ultra-detailed, 8k resolution, highres:1.3)");
      
      if (modifiers.artStyle) parts.push(modifiers.artStyle);
      if (modifiers.shotType) parts.push(modifiers.shotType);
      if (modifiers.cameraAngle) parts.push(modifiers.cameraAngle);
      if (stdBasePrompt) parts.push(stdBasePrompt);
      if (modifiers.gender) parts.push(modifiers.gender);
      if (modifiers.expression) parts.push(`expression: ${modifiers.expression}`);
      if (modifiers.attire) parts.push(`outfit: ${modifiers.attire}`);
      if (modifiers.background) parts.push(`background: ${modifiers.background}`);
      if (modifiers.lighting) parts.push(`${modifiers.lighting}`);
      if (modifiers.colorTone) parts.push(`${modifiers.colorTone}`);
      parts.push("cinematic lighting, hyper-realistic, intricate textures, sharp focus");

      // LOGIKA KONSISTENSI POSE & TUBUH (PERMINTAAN BAGIAN 1)
      let exactReplicaActive = false;
      if (modifiers.pose === 'Exact Replica (Kunci Pose Asli)') exactReplicaActive = true;
      else if (modifiers.pose && modifiers.pose !== 'Auto') parts.push(`pose: ${modifiers.pose}`); // Jika pose biasa

      if (modifiers.bodyShape === 'Exact Replica (Kunci Proporsi Asli)') exactReplicaActive = true;

      // Suntik instruksi agresif jika Exact Replica diaktifkan
      if (exactReplicaActive) {
        parts.push("The subject MUST maintain the EXACT identical pose, posture, and precise body proportions/shape as the original reference image. STRICTLY lock the body type, do not reconstruct or alter the figure.");
      }

      setStdFinalPrompt(parts.filter(Boolean).join(', '));
    } else {
      // FORMULA VIDEO PROMPT
      const gender = modifiers.gender || "a person";
      const attire = modifiers.attire || "their outfit";
      const action = videoModifiers.subjectAction === 'Auto' ? 'moving naturally' : videoModifiers.subjectAction;
      const cam = videoModifiers.cameraMovement === 'Auto' ? 'cinematic and steady' : videoModifiers.cameraMovement;
      const bg = modifiers.background || "the existing environment";
      const bgDyn = videoModifiers.bgDynamics === 'Auto' ? 'subtle natural' : videoModifiers.bgDynamics;
      const faceLock = videoModifiers.faceLock;
      const emo = audioConfig.emotion === 'Auto' ? 'natural' : audioConfig.emotion;
      const art = modifiers.artStyle || "cinematic hyper-realism";
      const light = modifiers.lighting || "cinematic lighting";
      const tone = modifiers.colorTone || "natural tone";

      let prompt = `A cinematic, continuous video of ${gender} wearing ${attire}. The subject is ${action}. Camera movement: ${cam}. The background is ${bg} with ${bgDyn} effects. The subject's face MUST be 100% strictly consistent with the provided reference image (Face Lock at ${faceLock}%).`;
      
      if (audioConfig.source !== 'Tanpa Suara') prompt += ` They are speaking with a ${emo} expression, featuring precise audio lip-sync.`;
      prompt += ` Art style: ${art}. Lighting: ${light}. Color Tone: ${tone}.`;
      if (stdBasePrompt) prompt += `\n\n(Base Visual Reference: ${stdBasePrompt})`;
      if (videoModifiers.seed) prompt += `\nSeed: ${videoModifiers.seed}`;
      if (audioConfig.source === 'Ketik Teks' && audioConfig.dialogueText) prompt += `\nDialogue Script: "${audioConfig.dialogueText}"`;
      
      setStdFinalPrompt(prompt);
    }
  };

  // ============================================================================
  // LOGIKA AI: MODE VIDEO PROMOSI
  // ============================================================================
  const generateVideoStoryboard = async () => {
    if (!scriptInput.trim()) { setError('Naskah tidak boleh kosong.'); return; }
    if (!productName.trim()) { setError('Nama produk wajib diisi.'); return; }
    setIsProcessing(true); setError(''); setStoryboardData(null);

    const systemPrompt = `You are an expert AI Video Director. Process the user's affiliate marketing script into a highly structured Storyboard.
    Analyze the segments (Hook, Show, Value, CTA) and the actions described.
    CRITICAL INSTRUCTIONS:
    1. Visual prompts MUST be in English.
    2. EVERY single visual prompt MUST end with this exact string: "Model face MUST be 100% identical to the reference image (Face Lock at ${promoFaceLock}%). The product ${productName} must strictly maintain its original label, text, and shape."
    3. Emotion/Tone Detection: If there is a voice tone/emotion indicated inside parentheses '()' in the script segment, use it. If no parenthesis is found, default to "${defaultTone}". Match the camera motion and model's expression to this tone.
    4. AUDIO TEXT: Extract the EXACT ORIGINAL INDONESIAN text from the script. DO NOT TRANSLATE IT TO ENGLISH. Just copy the original text and remove the parentheses containing the tone.
    5. Extract the social media caption and hashtags into the 'caption' field if present. Keep it in its original language.`;

    const parts = [{ text: systemPrompt }, { text: `Script:\n${scriptInput}` }];
    if (promoModelB64) parts.push({ text: "Image 1 (Model Reference):" }, { inlineData: { mimeType: 'image/jpeg', data: promoModelB64 } });
    if (promoProductB64) parts.push({ text: "Image 2 (Product Reference):" }, { inlineData: { mimeType: 'image/jpeg', data: promoProductB64 } });

    const payload = {
      contents: [{ role: "user", parts }],
      generationConfig: {
        responseMimeType: "application/json",
        responseSchema: {
          type: "OBJECT",
          properties: {
            scenes: {
              type: "ARRAY", items: {
                type: "OBJECT", properties: {
                  segment: { type: "STRING" }, audio: { type: "STRING" }, detectedTone: { type: "STRING" }, duration: { type: "STRING" }, visualPrompt: { type: "STRING" }
                }, required: ["segment", "audio", "detectedTone", "duration", "visualPrompt"]
              }
            },
            caption: { type: "STRING" }
          }, required: ["scenes", "caption"]
        }
      }
    };

    let retries = 0;
    while (retries < 3) {
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, 
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        setStoryboardData(JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text));
        setIsProcessing(false); return;
      } catch (err) {
        retries++; if (retries >= 3) { setError('Gagal memproses naskah.'); setIsProcessing(false); }
        await new Promise(r => setTimeout(r, 2000));
      }
    }
  };

  // FORMAT PENGGABUNGAN TEKS PER SCENE (BAGIAN 2 - PERMINTAAN USER)
  const getCombinedSceneText = (scene) => {
    return `--VISUAL INSTRUCTIONS--\n${scene.visualPrompt}\n\n--AUDIO & LIP-SYNC SCRIPT--\n${scene.audio}`;
  };

  const handleCopySingleScene = (scene, index) => {
    const textToCopy = getCombinedSceneText(scene);
    executeCopy(textToCopy, () => {
      setCopiedSceneIndexes(prev => ({ ...prev, [index]: true }));
      setTimeout(() => setCopiedSceneIndexes(prev => ({ ...prev, [index]: false })), 2000);
    });
  };

  const handleDownloadTxtPromo = () => {
    if (!storyboardData) return;
    const txtParts = storyboardData.scenes.map((s, i) => `SCENE ${i+1}: [${s.duration}] ${s.segment}\nNada Bicara: ${s.detectedTone}\n\n${getCombinedSceneText(s)}`);
    const fullText = txtParts.join('\n\n========================================\n\n') + `\n\n=== CAPTION & HASHTAGS ===\n${storyboardData.caption}`;
    
    const blob = new Blob([fullText], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a'); link.href = url; link.download = `Prompt_Promosi_${productName || 'Affiliate'}.txt`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
    setIsDownloaded(true); setTimeout(() => setIsDownloaded(false), 2000);
  };

  // ============================================================================
  // RENDER UI UTAMA
  // ============================================================================
  return (
    <div className="min-h-screen bg-slate-950 text-slate-200 font-sans p-4 md:p-8 selection:bg-indigo-500/30">
      <div className="max-w-7xl mx-auto space-y-6">
        
        {/* HEADER & TOGGLES NAVIGASI UTAMA */}
        <div className="bg-slate-900 rounded-2xl p-5 shadow-xl border border-slate-800 flex flex-col xl:flex-row items-center justify-between gap-4">
          <div className="flex items-center space-x-4">
            <div className="bg-gradient-to-br from-indigo-500 via-purple-600 to-rose-600 p-3 rounded-xl text-white shadow-lg shadow-indigo-900/20">
              <Sparkles size={28} />
            </div>
            <div>
              <h1 className="text-2xl font-black text-white tracking-tight">AI Master Prompt</h1>
              <p className="text-sm text-slate-400">Pusat Kreatif Visual & Naskah Promosi</p>
            </div>
          </div>
          
          <div className="flex flex-wrap justify-center bg-slate-950 p-1.5 rounded-xl border border-slate-800 gap-1">
            <button onClick={() => setAppMode('image')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold text-sm transition-all ${appMode === 'image' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
              <ImageIcon size={18} /> Mode Gambar
            </button>
            <button onClick={() => setAppMode('video')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold text-sm transition-all ${appMode === 'video' ? 'bg-purple-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
              <Film size={18} /> Mode Video
            </button>
            <button onClick={() => setAppMode('promo')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold text-sm transition-all ${appMode === 'promo' ? 'bg-rose-600 text-white shadow-md ring-2 ring-rose-500/30' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
              <ListVideo size={18} /> Mode Video Promosi
            </button>
          </div>
        </div>

        {error && <div className="bg-red-950/50 text-red-400 p-4 rounded-xl flex items-center border border-red-900"><AlertCircle className="mr-2" size={20} /> {error}</div>}

        {/* ============================================================================
             UI: MODE GAMBAR & MODE VIDEO BIASA
            ============================================================================ */}
        {(appMode === 'image' || appMode === 'video') && (
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-in fade-in duration-300">
            {/* KOLOM KIRI: UPLOAD & ANALISIS */}
            <div className="lg:col-span-5 space-y-6">
              <div className="bg-slate-900 rounded-2xl p-6 shadow-xl border border-slate-800">
                <h2 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                  <MapPin className={appMode === 'image' ? 'text-indigo-400' : 'text-purple-400'} size={20} /> 1. Referensi Visual Utama
                </h2>
                <div className="space-y-4">
                  <div onClick={() => stdBaseImgRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950/50 rounded-xl p-4 flex flex-col items-center justify-center text-center cursor-pointer hover:border-slate-500 transition-all group overflow-hidden">
                    <input type="file" ref={stdBaseImgRef} onChange={(e) => handleFileUpload(e, setStdBaseImgPreview, setStdBaseImgB64)} accept="image/*" className="hidden" />
                    {stdBaseImgPreview ? (
                      <div className="relative w-full aspect-video rounded-lg overflow-hidden bg-slate-950">
                        <img src={stdBaseImgPreview} className="w-full h-full object-contain" alt="Main" />
                      </div>
                    ) : (
                      <div className="py-6"><Upload className="mx-auto mb-3 text-slate-500" size={28} /><p className="text-sm font-medium text-slate-300">Klik Unggah Referensi Utama</p></div>
                    )}
                  </div>
                  <div onClick={() => stdFaceImgRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950/50 rounded-xl p-4 flex flex-col items-center justify-center text-center cursor-pointer hover:border-slate-500 transition-all group overflow-hidden">
                    <input type="file" ref={stdFaceImgRef} onChange={(e) => handleFileUpload(e, setStdFaceImgPreview, setStdFaceImgB64)} accept="image/*" className="hidden" />
                    {stdFaceImgPreview ? (
                      <div className="relative w-full aspect-video rounded-lg overflow-hidden bg-slate-950">
                        <img src={stdFaceImgPreview} className="w-full h-full object-contain" alt="Face" />
                      </div>
                    ) : (
                      <div className="py-2"><p className="text-xs font-semibold text-slate-400 flex items-center justify-center gap-2"><Fingerprint size={14}/> + Tambah Referensi Wajah (Opsional)</p></div>
                    )}
                  </div>
                </div>
                <button onClick={analyzeStandardImage} disabled={!stdBaseImgB64 || isProcessing} className="w-full mt-6 py-4 bg-slate-800 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-700 border border-slate-700 disabled:opacity-50 transition-all">
                  {isProcessing ? <Loader2 className="animate-spin" /> : <Wand2 size={20} />} Mulai Analisis Visual
                </button>
                {stdBasePrompt && (
                  <div className="mt-4 p-4 bg-slate-950 rounded-xl border border-slate-800">
                    <p className="text-xs font-bold text-slate-500 mb-2 uppercase">Hasil Analisis Base Prompt</p>
                    <p className="text-xs text-slate-300 line-clamp-3">{stdBasePrompt}</p>
                  </div>
                )}
              </div>
            </div>

            {/* KOLOM KANAN: MODIFIKASI GLOBAL & OUTPUT */}
            <div className="lg:col-span-7 space-y-6">
              <div className="bg-slate-900 rounded-2xl p-6 shadow-xl border border-slate-800">
                <h2 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                  <Palette className={appMode === 'image' ? 'text-indigo-400' : 'text-purple-400'} size={20} /> 2. Modifikasi Global
                </h2>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                  {/* Shared Modifiers */}
                  {Object.entries(SHARED_MODIFIER_OPTIONS).map(([key, config]) => (
                    <div key={key}>
                      <label className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter mb-1.5 block">{config.label}</label>
                      <div className="relative">
                        <select value={modifiers[key]} onChange={(e) => setModifiers(prev => ({ ...prev, [key]: e.target.value }))} className="w-full appearance-none bg-slate-950 border border-slate-700 text-slate-200 text-xs rounded-lg pl-3 pr-8 py-2.5 outline-none focus:border-indigo-500">
                          {config.options.map((opt, i) => <option key={i} value={opt}>{opt || '-- Auto --'}</option>)}
                        </select>
                        <ChevronDown size={14} className="absolute right-2.5 top-3 text-slate-500 pointer-events-none" />
                      </div>
                    </div>
                  ))}
                  {/* Image Only Modifiers */}
                  {appMode === 'image' && Object.entries(IMAGE_ONLY_OPTIONS).map(([key, config]) => (
                    <div key={key}>
                      <label className="text-[10px] font-bold text-indigo-400/80 uppercase tracking-tighter mb-1.5 block">{config.label}</label>
                      <div className="relative">
                        <select value={modifiers[key]} onChange={(e) => setModifiers(prev => ({ ...prev, [key]: e.target.value }))} className={`w-full appearance-none border text-slate-200 text-xs rounded-lg pl-3 pr-8 py-2.5 outline-none focus:border-indigo-500 ${modifiers[key] === 'Exact Replica (Kunci Pose Asli)' || modifiers[key] === 'Exact Replica (Kunci Proporsi Asli)' ? 'bg-indigo-900/50 border-indigo-500 text-indigo-200 font-bold' : 'bg-indigo-950/20 border-indigo-900/50'}`}>
                          {config.options.map((opt, i) => <option key={i} value={opt}>{opt || '-- Auto --'}</option>)}
                        </select>
                        <ChevronDown size={14} className="absolute right-2.5 top-3 text-indigo-500/50 pointer-events-none" />
                      </div>
                    </div>
                  ))}
                </div>

                {/* Video Only Modifiers */}
                {appMode === 'video' && (
                  <div className="mt-6 pt-6 border-t border-slate-800 space-y-5">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      {Object.entries(VIDEO_MODIFIER_OPTIONS).map(([key, config]) => (
                        <div key={key}>
                          <label className="text-[10px] font-bold text-purple-400 uppercase tracking-tighter mb-1.5 block flex items-center gap-1"><Video size={12}/> {config.label}</label>
                          <div className="relative">
                            <select value={videoModifiers[key]} onChange={(e) => setVideoModifiers(prev => ({ ...prev, [key]: e.target.value }))} className="w-full appearance-none bg-purple-950/20 border border-purple-900/50 text-slate-200 text-xs rounded-lg pl-3 pr-8 py-2.5 outline-none focus:border-purple-500">
                              {config.options.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                            </select>
                            <ChevronDown size={14} className="absolute right-2.5 top-3 text-purple-500/50 pointer-events-none" />
                          </div>
                        </div>
                      ))}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-950/50 p-4 rounded-xl border border-slate-800/80">
                      <div>
                        <label className="text-xs font-bold text-slate-300 flex items-center justify-between mb-2">
                          <span className="flex items-center gap-1"><Fingerprint size={14} className="text-purple-400"/> Face Lock</span>
                          <span className="text-purple-400">{videoModifiers.faceLock}%</span>
                        </label>
                        <input type="range" min="0" max="100" value={videoModifiers.faceLock} onChange={(e) => setVideoModifiers(prev => ({ ...prev, faceLock: e.target.value }))} className="w-full accent-purple-500 h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer" />
                      </div>
                      <div>
                        <label className="text-xs font-bold text-slate-300 flex items-center gap-1 mb-2"><Hash size={14} className="text-purple-400"/> Kode Konsistensi (Seed)</label>
                        <input type="text" placeholder="Contoh: 839210" value={videoModifiers.seed} onChange={(e) => setVideoModifiers(prev => ({ ...prev, seed: e.target.value }))} className="w-full bg-slate-900 border border-slate-700 text-slate-200 text-xs rounded-lg px-3 py-2 outline-none focus:border-purple-500" />
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* Audio Panel (Khusus Mode Video Biasa) */}
              {appMode === 'video' && (
                <div className="bg-slate-900 rounded-2xl p-6 shadow-xl border border-slate-800">
                  <h2 className="text-lg font-semibold text-white mb-4 flex items-center gap-2"><Mic className="text-pink-400" size={20} /> 3. Audio & Sinkronisasi Bibir (Lip-Sync)</h2>
                  <div className="space-y-4">
                    <div className="flex gap-4">
                      {['Tanpa Suara', 'Ketik Teks', 'Unggah File Audio'].map(src => (
                        <label key={src} className="flex items-center gap-2 cursor-pointer group">
                          <div className="relative flex items-center justify-center">
                            <input type="radio" name="audioSource" value={src} checked={audioConfig.source === src} onChange={(e) => setAudioConfig(prev => ({...prev, source: e.target.value}))} className="peer sr-only" />
                            <div className="w-4 h-4 rounded-full border-2 border-slate-600 peer-checked:border-pink-500 peer-checked:bg-pink-500 transition-all"></div>
                          </div>
                          <span className={`text-sm ${audioConfig.source === src ? 'text-pink-400 font-bold' : 'text-slate-400'}`}>{src}</span>
                        </label>
                      ))}
                    </div>
                    {audioConfig.source === 'Ketik Teks' && (
                      <div className="space-y-3 pt-3 border-t border-slate-800">
                        <div>
                          <label className="text-xs font-bold text-slate-400 mb-1.5 block">Teks Dialog</label>
                          <textarea value={audioConfig.dialogueText} onChange={(e) => setAudioConfig(prev => ({...prev, dialogueText: e.target.value}))} placeholder="Masukkan teks yang akan diucapkan karakter..." className="w-full h-20 bg-slate-950 border border-slate-700 text-slate-200 p-3 rounded-xl text-sm resize-none outline-none focus:border-pink-500" />
                        </div>
                        <div className="w-1/2">
                          <label className="text-[10px] font-bold text-slate-400 uppercase mb-1.5 block">Emosi Bicara</label>
                          <div className="relative">
                            <select value={audioConfig.emotion} onChange={(e) => setAudioConfig(prev => ({...prev, emotion: e.target.value}))} className="w-full appearance-none bg-slate-950 border border-slate-700 text-slate-200 text-xs rounded-lg pl-3 pr-8 py-2.5 outline-none focus:border-pink-500">
                              {AUDIO_EMOTIONS.map(emo => <option key={emo} value={emo}>{emo}</option>)}
                            </select>
                            <ChevronDown size={14} className="absolute right-2.5 top-3 text-slate-500 pointer-events-none" />
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* Generate & Output Standar */}
              <button onClick={generateStandardPrompt} className={`w-full text-white font-black py-4 rounded-2xl shadow-xl flex items-center justify-center gap-3 transition-transform active:scale-95 ${appMode === 'image' ? 'bg-gradient-to-r from-indigo-600 to-indigo-800' : 'bg-gradient-to-r from-purple-600 to-pink-700'}`}>
                <Sparkles /> BUAT PROMPT AKHIR SEKARANG
              </button>
              <div className="bg-slate-950 rounded-2xl p-6 border border-slate-800 relative">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-white font-bold flex items-center gap-2"><div className={`w-1.5 h-5 rounded-full ${appMode === 'image' ? 'bg-indigo-500' : 'bg-purple-500'}`} /> Master Prompt Output</h3>
                  <button onClick={() => executeCopy(stdFinalPrompt, () => { setCopiedGlobalPrompt(true); setTimeout(()=>setCopiedGlobalPrompt(false), 2000) })} className="text-slate-300 hover:text-white flex items-center gap-1 text-sm bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 transition-colors">
                    {copiedGlobalPrompt ? <Check size={16} className="text-green-400" /> : <Copy size={16} />} {copiedGlobalPrompt ? 'Tersalin' : 'Salin'}
                  </button>
                </div>
                <textarea readOnly value={stdFinalPrompt} placeholder="Hasil prompt akan muncul di sini..." className="w-full h-48 bg-slate-900 border border-slate-800 text-slate-300 p-4 rounded-xl text-sm font-mono leading-relaxed resize-none outline-none" />
              </div>
            </div>
          </div>
        )}

        {/* ============================================================================
        UI: MODE VIDEO PROMOSI (STORYBOARD TERPADU)
            ============================================================================ */}
        {appMode === 'promo' && (
          <div className="grid grid-cols-1 xl:grid-cols-12 gap-6 animate-in fade-in duration-300">
            <div className="xl:col-span-4 space-y-6">
              <div className="bg-slate-900 rounded-2xl p-6 shadow-xl border border-slate-800">
                <h2 className="text-lg font-bold text-white mb-4 flex items-center gap-2"><UserCircle className="text-rose-400" size={20} /> 1. Referensi Visual</h2>
                <div className="grid grid-cols-2 gap-4 mb-5">
                  <div onClick={() => promoModelRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950 rounded-xl p-3 flex flex-col items-center justify-center text-center cursor-pointer hover:border-rose-500 transition-all overflow-hidden h-32 relative group">
                    <input type="file" ref={promoModelRef} onChange={(e) => handleFileUpload(e, setPromoModelImg, setPromoModelB64)} accept="image/*" className="hidden" />
                    {promoModelImg ? <img src={promoModelImg} className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-40" alt="Model" /> : <><UserCircle className="text-slate-500 mb-2" size={24}/><span className="text-[11px] font-semibold text-slate-400">Unggah Foto Model</span></>}
                  </div>
                  <div onClick={() => promoProductRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950 rounded-xl p-3 flex flex-col items-center justify-center text-center cursor-pointer hover:border-rose-500 transition-all overflow-hidden h-32 relative group">
                    <input type="file" ref={promoProductRef} onChange={(e) => handleFileUpload(e, setPromoProductImg, setPromoProductB64)} accept="image/*" className="hidden" />
                    {promoProductImg ? <img src={promoProductImg} className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-40" alt="Product" /> : <><ShoppingBag className="text-slate-500 mb-2" size={24}/><span className="text-[11px] font-semibold text-slate-400">Unggah Foto Produk</span></>}
                  </div>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="text-[11px] font-bold text-slate-400 mb-1.5 block uppercase">Nama Produk / Merek</label>
                    <input type="text" placeholder="Contoh: Skintific 5X Ceramide" value={productName} onChange={(e) => setProductName(e.target.value)} className="w-full bg-slate-950 border border-slate-700 text-slate-200 text-sm rounded-lg px-3 py-2.5 outline-none focus:border-rose-500" />
                  </div>
                  <div>
                    <label className="text-[11px] font-bold text-slate-400 flex items-center justify-between mb-2 uppercase"><span>Kekuatan Face Lock</span><span className="text-rose-400 bg-rose-950/50 px-2 py-0.5 rounded font-mono">{promoFaceLock}%</span></label>
                    <input type="range" min="0" max="100" value={promoFaceLock} onChange={(e) => setPromoFaceLock(e.target.value)} className="w-full accent-rose-500 h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer" />
                  </div>
                </div>
              </div>
              <div className="bg-slate-900 rounded-2xl p-6 shadow-xl border border-slate-800 flex flex-col h-[400px]">
                <h2 className="text-lg font-bold text-white mb-4 flex items-center gap-2"><Captions className="text-rose-400" size={20} /> 2. Masukkan Naskah Sekali Take</h2>
                <textarea value={scriptInput} onChange={(e) => setScriptInput(e.target.value)} className="w-full flex-grow bg-slate-950 border border-slate-700 text-slate-300 p-4 rounded-xl text-xs font-mono leading-relaxed resize-none outline-none focus:border-rose-500 scrollbar-thin" placeholder="Ketik naskah affiliate Anda..." />
                <button onClick={generateVideoStoryboard} disabled={isProcessing} className="w-full mt-4 bg-gradient-to-r from-rose-600 to-orange-600 text-white font-black py-4 rounded-xl shadow-lg shadow-rose-900/30 flex items-center justify-center gap-2 transition-all active:scale-95 disabled:opacity-50">
                  {isProcessing ? <Loader2 className="animate-spin" /> : <Wand2 />} PROSES STORYBOARD
                </button>
              </div>
            </div>
            
            <div className="xl:col-span-8 space-y-6">
              <div className="bg-slate-900 rounded-2xl p-6 shadow-xl border border-slate-800 min-h-[600px] flex flex-col">
                <div className="flex items-center justify-between border-b border-slate-800 pb-4 mb-4">
                  <h2 className="text-lg font-bold text-white flex items-center gap-2"><Video className="text-rose-400" size={20} /> Hasil Auto-Storyboard AI</h2>
                  {storyboardData && (
                    <button onClick={handleDownloadTxtPromo} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold px-4 py-2 rounded-lg border border-slate-600 transition-colors text-xs">
                      <Download size={14} /> Download File TXT
                    </button>
                  )}
                </div>

                {storyboardData ? (
                  <div className="flex-grow space-y-6 animate-in fade-in duration-500">
                    
                    {/* TAMPILAN STORYBOARD BARU (FORMAT GABUNGAN) */}
                    <div className="space-y-4">
                      {storyboardData.scenes.map((scene, idx) => (
                        <div key={idx} className="bg-slate-950 border border-slate-800 rounded-xl overflow-hidden flex flex-col md:flex-row">
                          {/* Info Segmen */}
                          <div className="md:w-1/4 bg-slate-900/50 p-4 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col justify-center">
                            <span className="text-rose-400 font-black text-sm uppercase tracking-wider">{scene.segment}</span>
                            <span className="text-slate-500 font-mono text-xs mt-1">{scene.duration}</span>
                            <div className="mt-3 bg-slate-800/50 border border-slate-700/50 rounded px-2 py-1.5 text-[10px] text-orange-400 uppercase font-bold w-max">
                              Nada: {scene.detectedTone}
                            </div>
                          </div>
                          
                          {/* Text Area Terpadu & Tombol Copy */}
                          <div className="md:w-3/4 p-4 flex flex-col">
                            <textarea 
                              readOnly 
                              value={getCombinedSceneText(scene)}
                              className="w-full h-44 bg-slate-950 text-slate-300 p-3 rounded-lg text-xs font-mono leading-relaxed resize-none outline-none border border-slate-800 mb-3"
                            />
                            <button 
                              onClick={() => handleCopySingleScene(scene, idx)}
                              className={`self-end flex items-center gap-2 px-4 py-2 rounded-lg font-semibold text-xs transition-colors border ${copiedSceneIndexes[idx] ? 'bg-green-600/20 text-green-400 border-green-900' : 'bg-slate-800 text-slate-200 border-slate-600 hover:bg-slate-700'}`}
                            >
                              {copiedSceneIndexes[idx] ? <Check size={14} /> : <Copy size={14} />} 
                              Copy Prompt Lengkap (Visual + Teks)
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* Bagian Caption */}
                    {storyboardData.caption && (
                      <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 mt-6">
                        <h4 className="text-xs font-bold text-slate-400 uppercase mb-2 flex items-center gap-2"><Captions size={14}/> Teks Caption & Hashtag</h4>
                        <p className="text-sm text-slate-300 whitespace-pre-wrap">{storyboardData.caption}</p>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="flex flex-col items-center justify-center flex-grow text-slate-500 opacity-50">
                    <ListVideo size={48} className="mb-4" />
                    <p className="text-center font-medium">Storyboard Promosi Terpadu akan muncul di sini.<br/>Silakan isi naskah di panel kiri lalu klik Proses.</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}


        // ==========================================================
        // PASTIKAN 2 BARIS DI BAWAH INI TIDAK TERHAPUS
        // ==========================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
