<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Replica AI - Azlan Noor</title>
    <!-- Script Inti React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Script Ikon yang Stabil -->
    <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
</head>
<body class="bg-slate-950">
    <div id="root">
        <!-- Loading state -->
        <div style="color: #94a3b8; padding: 50px; text-align: center; font-family: sans-serif;">
            Memuat Sistem AI Master Prompt...<br><br>
            <small>Tunggu sebentar. Jika ini tidak hilang, silakan refresh halaman.</small>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useRef } = React;
        
        // SISTEM ANTI-BLANK: Fallback jika ikon gagal dimuat
        const lucide = window.lucideReact || window.LucideReact || new Proxy({}, { get: function() { return function() { return <span style={{color:'gray', fontSize:'12px'}}>❖</span>; }; }});
        const { Upload, Video, Image: ImageIcon, Wand2, Copy, Check, AlertCircle, Loader2, ListVideo, ShoppingBag, UserCircle, Captions, Mic, Download, Film, Sparkles, MapPin, Palette, Volume2, Fingerprint, Hash, ChevronDown } = lucide;

        // SISTEM KEAMANAN API KEY (LocalStorage)
        let API_KEY = localStorage.getItem('gemini_api_key_azlan');
        if (!API_KEY) {
            API_KEY = prompt("🔐 SISTEM KEAMANAN\n\nMasukkan Gemini API Key Anda untuk mengaktifkan AI:");
            if (API_KEY) {
                localStorage.setItem('gemini_api_key_azlan', API_KEY);
            } else {
                alert("Peringatan: API Key kosong. AI tidak akan berfungsi.");
            }
        }

        // ============================================================================
        // KONSTANTA & DATA
        // ============================================================================
        const SHARED_MODIFIER_OPTIONS = {
          gender: { label: 'Gender / Subjek', options: ['', '1boy, male', '1girl, female', 'androgynous', 'non-binary', 'a person'] },
          attire: { label: 'Gaya Pakaian', options: ['', 'Casual wear', 'Formal suit', 'Cyberpunk techwear', 'Fantasy armor', 'Traditional clothing', 'School uniform', 'Sportswear', 'Gothic fashion', 'Haute couture dress'] },
          background: { label: 'Latar Belakang', options: ['', 'Empty studio (White)', 'Empty studio (Dark)', 'Cyberpunk city street', 'Fantasy forest', 'Bedroom', 'Beach', 'Mountains', 'Outer space', 'Fashion runway', 'Ancient temple'] },
          artStyle: { label: 'Gaya Seni (Art Style)', options: ['', 'Photorealistic / Photography', 'Anime / Manga', '3D Render (Unreal Engine 5)', 'Oil painting', '2D Digital illustration', 'Cyberpunk aesthetic'] },
          lighting: { label: 'Pencahayaan', options: ['', 'Natural lighting (Daylight)', 'Studio lighting', 'Cinematic lighting', 'Neon lighting', 'Rim lighting', 'Golden hour', 'Moody / Dark', 'Soft diffuse lighting'] },
          colorTone: { label: 'Tone Warna', options: ['', 'Warm tone (Yellow/Orange)', 'Cool / Cold tone (Blue/Cyan)', 'Neutral tone', 'Sepia tone', 'High contrast', 'Desaturated / Muted'] }
        };

        const IMAGE_ONLY_OPTIONS = {
          bodyShape: { label: 'Bentuk Tubuh', options: ['Auto', 'Exact Replica (Kunci Proporsi Asli)'] },
          expression: { label: 'Ekspresi', options: ['', 'Neutral expression', 'Smiling', 'Laughing', 'Sad', 'Angry', 'Serious', 'Crying', 'Seductive smile'] },
          pose: { label: 'Pose', options: ['', 'Standing still', 'Sitting', 'Laying down', 'Walking', 'Running', 'Dynamic pose', 'High fashion pose', 'Vogue style', 'Exact Replica (Kunci Pose Asli)'] },
          shotType: { label: 'Tipe Shot', options: ['', 'Extreme Close-up', 'Close-up (Face)', 'Medium Shot (Chest up)', 'Cowboy Shot', 'Full Body', 'Wide shot'] },
          cameraAngle: { label: 'Angle Kamera', options: ['', 'Eye Level', 'High Angle (From Above)', 'Low Angle (From Below)', 'Dutch Angle (Tilted)', 'Bird\'s Eye View'] }
        };

        const VIDEO_MODIFIER_OPTIONS = {
          subjectAction: { label: 'Aksi Subjek', options: ['Auto', 'Diam (Statis)', 'Berbicara', 'Tersenyum Halus', 'Menoleh ke Kamera', 'Mengangguk', 'Berjalan'] },
          cameraMovement: { label: 'Gerakan Kamera', options: ['Auto', 'Statis', 'Zoom In Perlahan', 'Zoom Out', 'Pan Kanan', 'Pan Kiri', 'Mengitari Subjek (Orbit)'] },
          bgDynamics: { label: 'Dinamika Latar', options: ['Auto', 'Statis', 'Angin Sepoi-sepoi', 'Hujan', 'Salju Turun', 'Partikel Debu Mengambang', 'Lampu Berkedip'] }
        };

        const AUDIO_EMOTIONS = ['Auto', 'Datar', 'Ceria', 'Antusias', 'Sedih', 'Serius', 'Berbisik'];

        const DEFAULT_SCRIPT_TEMPLATE = `[0-5 dtk] Hook: "Pernah ngerasa wajah kusam walau udah pakai skincare mahal?" (bingung dan frustrasi)
[5-15 dtk] Show: "Untung aku nemu serum ajaib ini!" (ceria dan antusias sambil memegang produk)
[15-25 dtk] Value: "Teksturnya super ringan, cepet nyerap, dan bikin glowing seharian." (Kamera zoom in perlahan ke produk, lalu ke wajah model yang bercahaya)
[25-30 dtk] CTA: "Buruan klik keranjang kuning sekarang mumpung lagi diskon!" (semangat menunjuk bawah layar)

Caption:
Rahasia glowing seharian tanpa ribet! ✨ Dapatkan diskon spesial hari ini aja. #SkincareRoutine #Glowing #RekomendasiSkincare`;

        const DEFAULT_TONES = ['Natural / Netral', 'Ceria & Antusias', 'Serius & Profesional', 'Sedih / Empati', 'Tegas & Berwibawa', 'Santai / Kasual'];

        function App() {
          const [appMode, setAppMode] = useState('promo');
          const [isProcessing, setIsProcessing] = useState(false);
          const [error, setError] = useState('');
          const [copiedGlobalPrompt, setCopiedGlobalPrompt] = useState(false);
          const [copiedSceneIndexes, setCopiedSceneIndexes] = useState({});
          
          const [stdBaseImgPreview, setStdBaseImgPreview] = useState(null);
          const [stdBaseImgB64, setStdBaseImgB64] = useState('');
          const [stdFaceImgPreview, setStdFaceImgPreview] = useState(null);
          const [stdFaceImgB64, setStdFaceImgB64] = useState('');
          const [stdBasePrompt, setStdBasePrompt] = useState('');
          const [stdFinalPrompt, setStdFinalPrompt] = useState('');
          
          const [modifiers, setModifiers] = useState({
            ...Object.keys(SHARED_MODIFIER_OPTIONS).reduce((acc, key) => ({ ...acc, [key]: '' }), {}),
            ...Object.keys(IMAGE_ONLY_OPTIONS).reduce((acc, key) => ({ ...acc, [key]: '' }), {})
          });

          const [videoModifiers, setVideoModifiers] = useState({ subjectAction: 'Auto', cameraMovement: 'Auto', bgDynamics: 'Auto', faceLock: 100, seed: '' });
          const [audioConfig, setAudioConfig] = useState({ source: 'Tanpa Suara', dialogueText: '', emotion: 'Auto' });

          const stdBaseImgRef = useRef(null);
          const stdFaceImgRef = useRef(null);

          const [promoModelImg, setPromoModelImg] = useState(null);
          const [promoModelB64, setPromoModelB64] = useState('');
          const [promoProductImg, setPromoProductImg] = useState(null);
          const [promoProductB64, setPromoProductB64] = useState('');
          
          const [productName, setProductName] = useState('');
          const [promoFaceLock, setPromoFaceLock] = useState(100);
          const [scriptInput, setScriptInput] = useState(DEFAULT_SCRIPT_TEMPLATE);
          const [storyboardData, setStoryboardData] = useState(null);

          const promoModelRef = useRef(null);
          const promoProductRef = useRef(null);

          const handleFileUpload = (e, setPreview, setB64) => {
            const file = e.target.files[0];
            if (!file) return;
            setPreview(URL.createObjectURL(file));
            const reader = new FileReader();
            reader.onloadend = () => setB64(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
          };

          const executeCopy = (text, callback) => {
            navigator.clipboard.writeText(text).catch(() => {
                const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
            });
            callback();
          };

          const analyzeStandardImage = async () => {
            if (!stdBaseImgB64) { setError('Silakan unggah Gambar Referensi Utama terlebih dahulu.'); return; }
            setIsProcessing(true); setError('');

            let parts = [];
            const sysInstruction = "You are an expert Vision AI. Provide a highly detailed description of the subject's physical features, clothing materials, and background details. Format: English language, comma-separated keywords. No full sentences.";

            if (stdFaceImgB64) {
              parts = [
                { text: sysInstruction + " Combine body/clothes from Image 1 with facial features from Image 2." },
                { text: "Image 1 (Environment & Body):" }, { inlineData: { mimeType: 'image/jpeg', data: stdBaseImgB64 } },
                { text: "Image 2 (Specific Face):" }, { inlineData: { mimeType: 'image/jpeg', data: stdFaceImgB64 } }
              ];
            } else {
              parts = [{ text: sysInstruction }, { inlineData: { mimeType: 'image/jpeg', data: stdBaseImgB64 } }];
            }

            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, 
                { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ role: "user", parts }] }) });
              const data = await res.json();
              if(data.error) throw new Error(data.error.message);
              setStdBasePrompt((data.candidates?.[0]?.content?.parts?.[0]?.text || '').trim());
            } catch (err) { setError('Gagal menganalisis gambar: Pastikan API Key valid. ' + err.message); } 
            finally { setIsProcessing(false); }
          };

          const generateStandardPrompt = () => {
            if (appMode === 'image') {
              const parts = ["(masterpiece, best quality, ultra-detailed, 8k resolution, highres:1.3)"];
              if (modifiers.artStyle) parts.push(modifiers.artStyle);
              if (modifiers.shotType) parts.push(modifiers.shotType);
              if (modifiers.cameraAngle) parts.push(modifiers.cameraAngle);
              if (stdBasePrompt) parts.push(stdBasePrompt);
              if (modifiers.gender) parts.push(modifiers.gender);
              if (modifiers.expression) parts.push(`expression: ${modifiers.expression}`);
              if (modifiers.attire) parts.push(`outfit: ${modifiers.attire}`);
              if (modifiers.background) parts.push(`background: ${modifiers.background}`);
              if (modifiers.lighting) parts.push(`${modifiers.lighting}`);
              if (modifiers.colorTone) parts.push(`${modifiers.colorTone}`);
              parts.push("cinematic lighting, hyper-realistic, intricate textures, sharp focus");

              let exactReplicaActive = false;
              if (modifiers.pose === 'Exact Replica (Kunci Pose Asli)') exactReplicaActive = true;
              else if (modifiers.pose && modifiers.pose !== 'Auto') parts.push(`pose: ${modifiers.pose}`);
              if (modifiers.bodyShape === 'Exact Replica (Kunci Proporsi Asli)') exactReplicaActive = true;

              if (exactReplicaActive) parts.push("The subject MUST maintain the EXACT identical pose, posture, and precise body proportions/shape as the original reference image. STRICTLY lock the body type, do not reconstruct or alter the figure.");
              setStdFinalPrompt(parts.filter(Boolean).join(', '));
            } else {
              const action = videoModifiers.subjectAction === 'Auto' ? 'moving naturally' : videoModifiers.subjectAction;
              const cam = videoModifiers.cameraMovement === 'Auto' ? 'cinematic and steady' : videoModifiers.cameraMovement;
              const bgDyn = videoModifiers.bgDynamics === 'Auto' ? 'subtle natural' : videoModifiers.bgDynamics;
              
              let prompt = `A cinematic, continuous video of ${modifiers.gender||'a person'} wearing ${modifiers.attire||'their outfit'}. The subject is ${action}. Camera movement: ${cam}. The background is ${modifiers.background||'the existing environment'} with ${bgDyn} effects. The subject's face MUST be 100% strictly consistent with the provided reference image (Face Lock at ${videoModifiers.faceLock}%).`;
              
              if (audioConfig.source !== 'Tanpa Suara') prompt += ` They are speaking with a ${audioConfig.emotion === 'Auto' ? 'natural' : audioConfig.emotion} expression, featuring precise audio lip-sync.`;
              prompt += ` Art style: ${modifiers.artStyle||'cinematic hyper-realism'}. Lighting: ${modifiers.lighting||'cinematic lighting'}. Color Tone: ${modifiers.colorTone||'natural tone'}.`;
              if (stdBasePrompt) prompt += `\n\n(Base Visual Reference: ${stdBasePrompt})`;
              if (videoModifiers.seed) prompt += `\nSeed: ${videoModifiers.seed}`;
              if (audioConfig.source === 'Ketik Teks' && audioConfig.dialogueText) prompt += `\nDialogue Script: "${audioConfig.dialogueText}"`;
              setStdFinalPrompt(prompt);
            }
          };

          const generateVideoStoryboard = async () => {
            if (!scriptInput.trim()) { setError('Naskah tidak boleh kosong.'); return; }
            if (!productName.trim()) { setError('Nama produk wajib diisi.'); return; }
            setIsProcessing(true); setError(''); setStoryboardData(null);

            const systemPrompt = `You are an expert AI Video Director. Process the user's affiliate marketing script into a highly structured Storyboard. Analyze segments (Hook, Show, Value, CTA). CRITICAL INSTRUCTIONS: 1. Visual prompts MUST be in English. 2. EVERY visual prompt MUST end with: "Model face MUST be 100% identical to the reference image (Face Lock at ${promoFaceLock}%). The product ${productName} must strictly maintain its original label, text, and shape." 3. Extract exact Indonesian audio script.`;

            const parts = [{ text: systemPrompt }, { text: `Script:\n${scriptInput}` }];
            if (promoModelB64) parts.push({ text: "Image 1 (Model Reference):" }, { inlineData: { mimeType: 'image/jpeg', data: promoModelB64 } });
            if (promoProductB64) parts.push({ text: "Image 2 (Product Reference):" }, { inlineData: { mimeType: 'image/jpeg', data: promoProductB64 } });

            const payload = {
              contents: [{ role: "user", parts }],
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "OBJECT",
                  properties: {
                    scenes: { type: "ARRAY", items: { type: "OBJECT", properties: { segment: { type: "STRING" }, audio: { type: "STRING" }, detectedTone: { type: "STRING" }, duration: { type: "STRING" }, visualPrompt: { type: "STRING" } }, required: ["segment", "audio", "detectedTone", "duration", "visualPrompt"] } },
                    caption: { type: "STRING" }
                  }, required: ["scenes", "caption"]
                }
              }
            };

            let retries = 0;
            while (retries < 3) {
              try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, 
                  { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                if(data.error) throw new Error(data.error.message);
                setStoryboardData(JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text));
                setIsProcessing(false); return;
              } catch (err) {
                retries++; if (retries >= 3) { setError('Gagal memproses naskah: Cek API Key Anda. ' + err.message); setIsProcessing(false); }
                await new Promise(r => setTimeout(r, 2000));
              }
            }
          };

          const handleCopySingleScene = (scene, index) => {
            const textToCopy = `--VISUAL INSTRUCTIONS--\n${scene.visualPrompt}\n\n--AUDIO & LIP-SYNC SCRIPT--\n${scene.audio}`;
            executeCopy(textToCopy, () => {
              setCopiedSceneIndexes(prev => ({ ...prev, [index]: true }));
              setTimeout(() => setCopiedSceneIndexes(prev => ({ ...prev, [index]: false })), 2000);
            });
          };

          return (
            <div className="min-h-screen text-slate-200 font-sans p-4 md:p-8">
              <div className="max-w-7xl mx-auto space-y-6">
                
                <div className="bg-slate-900 rounded-2xl p-5 border border-slate-800 flex flex-col xl:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-4">
                    <div className="bg-rose-600 p-3 rounded-xl text-white"><Sparkles size={28} /></div>
                    <div><h1 className="text-2xl font-black text-white">AI Master Prompt</h1><p className="text-sm text-slate-400">Pusat Kreatif Visual & Naskah</p></div>
                  </div>
                  <div className="flex gap-1 bg-slate-950 p-1.5 rounded-xl border border-slate-800">
                    <button onClick={() => setAppMode('image')} className={`px-4 py-2 rounded-lg font-bold text-sm transition-all ${appMode === 'image' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>Gambar</button>
                    <button onClick={() => setAppMode('video')} className={`px-4 py-2 rounded-lg font-bold text-sm transition-all ${appMode === 'video' ? 'bg-purple-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>Video</button>
                    <button onClick={() => setAppMode('promo')} className={`px-4 py-2 rounded-lg font-bold text-sm transition-all ${appMode === 'promo' ? 'bg-rose-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>Video Promosi</button>
                  </div>
                </div>

                {error && <div className="bg-red-900/50 text-red-300 p-4 rounded-xl flex items-center border border-red-900"><AlertCircle className="mr-2"/> {error}</div>}

                {(appMode === 'image' || appMode === 'video') && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-in fade-in duration-300">
                    <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 space-y-4">
                      <h2 className="text-lg font-bold text-white mb-2">1. Referensi Visual</h2>
                      <div onClick={() => stdBaseImgRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950 p-4 text-center cursor-pointer rounded-xl hover:border-slate-500 transition-all">
                        <input type="file" ref={stdBaseImgRef} onChange={(e) => handleFileUpload(e, setStdBaseImgPreview, setStdBaseImgB64)} accept="image/*" className="hidden" />
                        {stdBaseImgPreview ? <img src={stdBaseImgPreview} className="w-full rounded-lg" /> : <div className="py-4 text-slate-400">Klik Unggah Referensi Utama</div>}
                      </div>
                      <div onClick={() => stdFaceImgRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950 p-3 text-center cursor-pointer rounded-xl hover:border-slate-500 transition-all">
                        <input type="file" ref={stdFaceImgRef} onChange={(e) => handleFileUpload(e, setStdFaceImgPreview, setStdFaceImgB64)} accept="image/*" className="hidden" />
                        {stdFaceImgPreview ? <img src={stdFaceImgPreview} className="w-full rounded-lg" /> : <div className="text-sm text-slate-400">+ Tambah Wajah (Opsional)</div>}
                      </div>
                      <button onClick={analyzeStandardImage} disabled={!stdBaseImgB64 || isProcessing} className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition-colors">{isProcessing ? 'Menganalisis...' : 'Analisis Gambar'}</button>
                      {stdBasePrompt && <p className="text-xs text-slate-400 mt-2 bg-slate-950 p-3 rounded-lg border border-slate-800">{stdBasePrompt}</p>}
                    </div>

                    <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800">
                      <h2 className="text-lg font-bold text-white mb-4">2. Modifikasi Global</h2>
                      <div className="grid grid-cols-2 gap-3">
                        {Object.entries(SHARED_MODIFIER_OPTIONS).map(([key, config]) => (
                          <div key={key}>
                            <label className="text-[10px] font-bold text-slate-400 block mb-1">{config.label}</label>
                            <select value={modifiers[key]} onChange={(e) => setModifiers(prev => ({ ...prev, [key]: e.target.value }))} className="w-full bg-slate-950 border border-slate-700 text-xs rounded-lg p-2 text-white outline-none focus:border-indigo-500">
                              {config.options.map(opt => <option key={opt} value={opt}>{opt || '-- Auto --'}</option>)}
                            </select>
                          </div>
                        ))}
                      </div>
                      <button onClick={generateStandardPrompt} className="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-indigo-900/20">BUAT PROMPT AKHIR</button>
                      <textarea readOnly value={stdFinalPrompt} className="w-full h-32 mt-4 bg-slate-950 border border-slate-700 text-slate-300 p-3 rounded-lg text-xs resize-none" placeholder="Hasil prompt di sini..."/>
                    </div>
                  </div>
                )}

                {appMode === 'promo' && (
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-in fade-in duration-300">
                    <div className="lg:col-span-4 space-y-6">
                      <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800">
                        <h2 className="text-lg font-bold text-white mb-4">1. Referensi Promosi</h2>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                          <div onClick={() => promoModelRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950 h-24 flex items-center justify-center text-center cursor-pointer rounded-lg relative overflow-hidden group">
                            <input type="file" ref={promoModelRef} onChange={(e) => handleFileUpload(e, setPromoModelImg, setPromoModelB64)} accept="image/*" className="hidden" />
                            {promoModelImg ? <img src={promoModelImg} className="absolute w-full h-full object-cover opacity-50 group-hover:opacity-30 transition-opacity" /> : <span className="text-[10px] text-slate-400">Foto Model</span>}
                          </div>
                          <div onClick={() => promoProductRef.current.click()} className="border-2 border-dashed border-slate-700 bg-slate-950 h-24 flex items-center justify-center text-center cursor-pointer rounded-lg relative overflow-hidden group">
                            <input type="file" ref={promoProductRef} onChange={(e) => handleFileUpload(e, setPromoProductImg, setPromoProductB64)} accept="image/*" className="hidden" />
                            {promoProductImg ? <img src={promoProductImg} className="absolute w-full h-full object-cover opacity-50 group-hover:opacity-30 transition-opacity" /> : <span className="text-[10px] text-slate-400">Foto Produk</span>}
                          </div>
                        </div>
                        <input type="text" placeholder="Nama Produk (Wajib)" value={productName} onChange={(e) => setProductName(e.target.value)} className="w-full bg-slate-950 border border-slate-700 text-sm rounded-lg p-3 text-white mb-4 outline-none focus:border-rose-500" />
                        <label className="text-xs text-slate-400 flex justify-between mb-1"><span>Face Lock</span><span>{promoFaceLock}%</span></label>
                        <input type="range" min="0" max="100" value={promoFaceLock} onChange={(e) => setPromoFaceLock(e.target.value)} className="w-full accent-rose-500" />
                      </div>
                      
                      <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800">
                        <h2 className="text-lg font-bold text-white mb-2">2. Masukkan Naskah</h2>
                        <textarea value={scriptInput} onChange={(e) => setScriptInput(e.target.value)} className="w-full h-48 bg-slate-950 border border-slate-700 p-3 rounded-lg text-xs text-slate-300 outline-none focus:border-rose-500" placeholder="Paste naskah promosi Anda di sini..." />
                        <button onClick={generateVideoStoryboard} disabled={isProcessing} className="w-full mt-4 bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-xl disabled:opacity-50 transition-all shadow-lg shadow-orange-900/20">
                          {isProcessing ? 'MEMPROSES...' : 'PROSES STORYBOARD'}
                        </button>
                      </div>
                    </div>
                    
                    <div className="lg:col-span-8 bg-slate-900 rounded-2xl p-6 border border-slate-800 min-h-[500px]">
                      <h2 className="text-lg font-bold text-white mb-4">Hasil Storyboard</h2>
                      {storyboardData ? (
                        <div className="space-y-4 animate-in slide-in-from-bottom duration-500">
                          {storyboardData.scenes.map((scene, idx) => (
                            <div key={idx} className="bg-slate-950 border border-slate-800 rounded-xl p-4 flex flex-col gap-2">
                              <div className="flex justify-between items-center"><span className="text-rose-400 font-bold text-sm">{scene.segment} ({scene.duration})</span><span className="bg-slate-800 px-2 py-1 text-[10px] text-orange-400 rounded">Nada: {scene.detectedTone}</span></div>
                              <textarea readOnly value={`--VISUAL INSTRUCTIONS--\n${scene.visualPrompt}\n\n--AUDIO & LIP-SYNC SCRIPT--\n${scene.audio}`} className="w-full h-32 bg-slate-900 p-3 text-xs text-slate-300 border border-slate-800 rounded mt-2 resize-none outline-none" />
                              <button onClick={() => handleCopySingleScene(scene, idx)} className={`self-end flex items-center gap-2 px-4 py-2 rounded-lg font-semibold text-xs transition-all border ${copiedSceneIndexes[idx] ? 'bg-green-600/20 text-green-400 border-green-900' : 'bg-slate-800 text-slate-200 border-slate-700 hover:bg-slate-700'}`}>
                                {copiedSceneIndexes[idx] ? <Check size={14} /> : <Copy size={14} />}
                                {copiedSceneIndexes[idx] ? 'Tersalin!' : 'Copy Prompt Lengkap'}
                              </button>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="flex flex-col items-center justify-center h-full text-slate-500 opacity-50">
                          <ListVideo size={48} className="mb-4" />
                          <p className="text-center font-medium">Isi data dan klik proses untuk melihat hasil storyboard.</p>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
